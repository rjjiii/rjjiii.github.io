<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Bul</title>
<style>
  :root{
    --gold:#ffd75e; --text:#e9e3d4; --text-dim:#a59c86;
    --font-body:'Avenir Next','Segoe UI',Roboto,system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;
    --font-display:'Iowan Old Style','Palatino Linotype',Palatino,'Hoefler Text',Georgia,'Times New Roman',serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;}
  body{
    min-height:100vh; font-family:var(--font-body); color:var(--text);
    background:radial-gradient(130% 95% at 50% 22%, #2b303b 0%, #1b1f28 48%, #13151b 100%);
    background-attachment:fixed; -webkit-tap-highlight-color:transparent;
  }
  :focus-visible{outline:2px solid var(--gold); outline-offset:3px; border-radius:6px;}

  .table{position:fixed; inset:0; overflow:hidden;}
  .core{position:absolute; inset:26px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;}
  #board{
    height:min(calc(100dvh - 84px), calc((100vw - 36px) * 1.8594));
    width:auto; aspect-ratio:640/1190; display:block;
    filter:drop-shadow(0 10px 30px rgba(0,0,0,0.5));
  }
  .hud{display:flex; flex-direction:column; align-items:center; gap:6px; max-width:calc(100vw - 36px);}
  .status{font-family:var(--font-display); font-size:16px; color:var(--text); text-align:center; min-height:22px;}

  .overlay{position:fixed; inset:0; background:rgba(10,12,16,0.82); display:flex; align-items:center; justify-content:center; z-index:20; backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px);}
  .hidden{display:none !important;}
  .card{background:linear-gradient(160deg,#2c2620,#1c1813); border:1px solid rgba(255,225,170,.18); border-radius:18px; padding:30px 34px; max-width:430px; text-align:center; box-shadow:0 18px 50px rgba(0,0,0,.6);}
  .card h1{font-family:var(--font-display); font-size:28px; margin:0 0 4px; color:var(--gold);}
  .card .sub{font-size:13px; color:var(--text-dim); margin:0 0 16px; letter-spacing:0.5px;}
  .card p{font-size:14px; color:var(--text-dim); line-height:1.55; margin:0 0 20px; text-align:left;}
  button{font-family:inherit; font-size:14px; font-weight:700; padding:10px 24px; border-radius:9px; border:1.5px solid rgba(255,215,94,0.5); background:linear-gradient(145deg,#3a4150,#272c36); color:#ffe9a8; cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,0.4);}
  button:hover{ filter:brightness(1.12); }

  .kglow{ animation:kglowp 1.2s ease-in-out infinite; }
  @keyframes kglowp{0%,100%{opacity:.85;}50%{opacity:.28;}}
  .kpulse{ animation:kpulse 1.2s ease-in-out infinite; }
  @keyframes kpulse{0%,100%{opacity:1;}50%{opacity:.35;}}
</style>
</head>
<body>

<div class="table">
  <div class="core">
    <svg id="board" viewBox="0 0 640 1190" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="wood" x1="0" y1="0" x2="0.85" y2="1"><stop offset="0%" stop-color="#855f3a"/><stop offset="38%" stop-color="#5e4128"/><stop offset="100%" stop-color="#311e0d"/></linearGradient>
        <pattern id="grain" patternUnits="userSpaceOnUse" width="13" height="13" patternTransform="rotate(63)"><rect width="6.5" height="13" fill="rgba(0,0,0,0.11)"/><rect x="6.5" width="6.5" height="13" fill="rgba(255,240,210,0.03)"/></pattern>
        <filter id="psh" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.45"/></filter>
        <radialGradient id="glowhalo" cx="50%" cy="50%" r="50%"><stop offset="35%" stop-color="#ffc846" stop-opacity="0.55"/><stop offset="100%" stop-color="#ffc846" stop-opacity="0"/></radialGradient>
        <linearGradient id="kLight" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f3e6bf"/><stop offset="100%" stop-color="#cdb074"/></linearGradient>
        <linearGradient id="kDark" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4a3a26"/><stop offset="100%" stop-color="#241a10"/></linearGradient>
        <linearGradient id="sandstone" x1="0.05" y1="0" x2="0.95" y2="1"><stop offset="0" stop-color="#c2a079"/><stop offset="0.10" stop-color="#b06a44"/><stop offset="0.30" stop-color="#b87049"/><stop offset="0.40" stop-color="#dcc9a6"/><stop offset="0.47" stop-color="#b26a44"/><stop offset="0.62" stop-color="#a45d38"/><stop offset="0.72" stop-color="#cdb791"/><stop offset="0.80" stop-color="#b06a44"/><stop offset="1" stop-color="#9a5734"/></linearGradient>
        <linearGradient id="basalt" x1="0.1" y1="0" x2="0.9" y2="1"><stop offset="0" stop-color="#6b7178"/><stop offset="0.5" stop-color="#595f66"/><stop offset="1" stop-color="#474d54"/></linearGradient>
      </defs>
      <g id="staticG"></g>
      <g id="kernelG"></g>
      <g id="cityG"></g>
      <g id="trackG"></g>
      <g id="ghostG"></g>
    </svg>
    <div class="hud">
      <div class="status" id="status"></div>
    </div>
  </div>
</div>

<div class="overlay" id="setup">
  <div class="card">
    <h1>Bul</h1>
    <div class="sub">A Maya running-fight game</div>
    <p>Two sides race five stones in opposite directions across the same narrow lane. Land on an enemy stone to capture and carry it. Carry captives off the far side of the lane to remove them from the game. The last player with any stones remaining on the lane wins.</p>
    <button id="startbtn">Start Game</button>
  </div>
</div>

<div class="overlay hidden" id="banner">
  <div class="card">
    <h1 id="bannertitle"></h1>
    <p id="bannersub" style="text-align:center;"></p>
    <button id="againbtn">Play Again</button>
  </div>
</div>

<script>
/* ============================ Geometry ============================ */
const VBW=640, VBH=1190, FR=40, BX=56, TW=528, CITY_H=150, CELL_H=90, TRACK_LEN=9;
const COLSP=96, CENTER=BX+TW/2;            // five lanes across the track
const P2_CITY_Y=FR;                         // Black, top
const TRACK_TOP=FR+CITY_H;
const P1_CITY_Y=TRACK_TOP+TRACK_LEN*CELL_H; // Sand, bottom
const STONE_R=30, CAP_R=18;
const KW=40, KH=46;                                    // larger, more visible kernels
const KL_Y=[772,828,884,940], KR_Y=[250,306,362,418];  // left strip runs up from the bottom (Sand); right runs down from the top (Black)
const KL_X=28, KR_X=612;

function columnX(col){ return CENTER + (col-2)*COLSP; }     // col 0..4
function rowY(p){ return TRACK_TOP + (9-p)*CELL_H + CELL_H/2; }   // space 1 nearest Sand (bottom), 9 nearest Black (top)
function cityCenterY(color){ return color==='A' ? P1_CITY_Y+CITY_H/2 : P2_CITY_Y+CITY_H/2; }

const COL={
  A:{base:'#d98841',hi:'#f3b478',sh:'#9a5420'},   // Sand (warm orange)
  B:{base:'#2c2c30',hi:'#56565c',sh:'#141417'}    // Black
};
const NAME={A:'Light', B:'Dark'};
// fixed (non-flickering) surface flecks that give the stones a matte, granular look
const BASALT_FLECKS=[[-0.32,-0.18,0.16,'#777d84',0.5],[0.22,-0.05,0.12,'#3f4549',0.45],[-0.08,0.30,0.18,'#4d535a',0.42],[0.34,0.18,0.10,'#787e85',0.5],[0.05,-0.32,0.09,'#414750',0.4]];
const SAND_FLECKS=[[-0.18,-0.22,0.16,'#dccaa9',0.30],[0.22,0.12,0.13,'#9a5734',0.24],[0.30,-0.26,0.10,'#e0d2b4',0.28]];
function drawFlecks(parent,x,y,r,set){ for(let i=0;i<set.length;i++){ const f=set[i]; E('ellipse',{cx:x+f[0]*r,cy:y+f[1]*r,rx:f[2]*r,ry:f[2]*r*0.8,fill:f[3],opacity:f[4]},parent); } }

const SVGNS='http://www.w3.org/2000/svg';
function E(tag,attrs,parent){ const el=document.createElementNS(SVGNS,tag); for(const k in attrs) el.setAttribute(k, attrs[k]); if(parent) parent.appendChild(el); return el; }
function clear(el){ while(el.firstChild) el.removeChild(el.firstChild); }

/* ============================ Audio ============================ */
let actx=null;
function ac(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(actx&&actx.state==='suspended') actx.resume(); return actx; }
function tone(freq,dur,opts){ const a=ac(); if(!a) return; opts=opts||{}; const o=a.createOscillator(); const g=a.createGain(); o.type=opts.type||'sine'; o.frequency.value=freq; const t0=a.currentTime+(opts.delay||0); const vol=opts.vol||0.2; g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(vol,t0+0.015); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur); o.connect(g); g.connect(a.destination); o.start(t0); o.stop(t0+dur+0.02); }
function noise(dur,opts){ const a=ac(); if(!a) return; opts=opts||{}; const buf=a.createBuffer(1,Math.max(1,Math.floor(a.sampleRate*dur)),a.sampleRate); const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5); const src=a.createBufferSource(); src.buffer=buf; const g=a.createGain(); const t0=a.currentTime+(opts.delay||0); g.gain.setValueAtTime(opts.vol||0.18,t0); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur); src.connect(g); g.connect(a.destination); src.start(t0); }
const SND={
  throwK:function(){ noise(0.2,{vol:0.16}); },
  move:function(){ tone(180,0.12,{type:'triangle',vol:0.12}); },
  capture:function(){ tone(420,0.1,{type:'square',vol:0.16}); tone(260,0.14,{type:'square',vol:0.12,delay:0.05}); },
  kill:function(){ [380,300,220].forEach(function(f,i){ tone(f,0.18,{type:'sawtooth',vol:0.12,delay:i*0.09}); }); },
  home:function(){ tone(520,0.16,{type:'sine',vol:0.14}); },
  win:function(){ [523,659,784,1047].forEach(function(f,i){ tone(f,0.22,{type:'triangle',vol:0.16,delay:i*0.1}); }); }
};

/* ============================ State ============================ */
let pieces=[], board=[], turn='A', phase='setup', rollValue=null, rollMarks=null,
    legal={enter:false,advance:[]}, busy=false, gameOver=false, winner=null, hiddenIds=new Set();

function pieceById(id){ return pieces.find(function(p){ return p.id===id; }); }

function newGame(){
  pieces=[];
  for(let i=0;i<5;i++) pieces.push({id:'A'+i, color:'A', col:i, status:'city', pos:null, carriedBy:null});
  for(let i=0;i<5;i++) pieces.push({id:'B'+i, color:'B', col:i, status:'city', pos:null, carriedBy:null});
  board=new Array(11).fill(null);
  turn='A'; phase='intro'; rollValue=null; rollMarks=null; legal={enter:false,advance:[]};
  busy=false; gameOver=false; winner=null; hiddenIds=new Set();
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('banner').classList.add('hidden');
  renderAll();
  setTimeout(openingRoll, 400);
}

/* ============================ Rules engine (validated) ============================ */
function rollKernels(){
  const marks=[0,0,0,0].map(function(){ return Math.random()<0.5; });
  const dark=marks.filter(Boolean).length;
  const value = dark>0 ? dark : 5;
  return {marks:marks, value:value};
}

function legalMovesFor(color, roll){
  const out={enter:false, advance:[]};
  const cityPieces=pieces.filter(function(p){ return p.color===color && p.status==='city'; });
  if(cityPieces.length){
    const target=(color==='A') ? roll : (10-roll);
    const occ=board[target];
    if(!occ || pieceById(occ).color!==color) out.enter=true;
  }
  const actives=pieces.filter(function(p){ return p.color===color && p.status==='active'; });
  for(let i=0;i<actives.length;i++){
    const p=actives[i];
    const newPos=(color==='A') ? p.pos+roll : p.pos-roll;
    if((color==='A'&&newPos>=10) || (color==='B'&&newPos<=0)){ out.advance.push(p.id); continue; }
    const occ=board[newPos];
    if(!occ || pieceById(occ).color!==color) out.advance.push(p.id);
  }
  return out;
}

function isEliminated(color){
  return pieces.filter(function(p){ return p.color===color && (p.status==='city'||p.status==='active'||p.status==='free-rider'); }).length===0;
}

function resolveLanding(mover, targetPos){
  const occId=board[targetPos];
  if(occId && occId!==mover.id){
    const swept=pieces.filter(function(q){ return q.id===occId || q.carriedBy===occId; });
    for(let i=0;i<swept.length;i++){ const q=swept[i]; q.carriedBy=mover.id; q.status=(q.color===mover.color)?'free-rider':'captive'; }
  }
  mover.status='active'; mover.pos=targetPos; mover.carriedBy=null;
  board[targetPos]=mover.id;
}

function doEnter(color, roll, pieceId){
  const mover = pieceId ? pieceById(pieceId) : pieces.find(function(p){ return p.color===color && p.status==='city'; });
  const target=(color==='A') ? roll : (10-roll);
  const occId=board[target];
  const willCapture=!!occId;
  resolveLanding(mover, target);
  return {mover:mover, target:target, willCapture:willCapture, homecoming:false};
}

function doAdvance(pieceId, color, roll){
  const mover=pieceById(pieceId);
  const oldPos=mover.pos;
  board[oldPos]=null;
  const newPos=(color==='A') ? oldPos+roll : oldPos-roll;
  if((color==='A'&&newPos>=10) || (color==='B'&&newPos<=0)){
    const riders=pieces.filter(function(q){ return q.carriedBy===mover.id; });
    const hadCaptiveRiders = riders.some(function(r){ return r.status==='captive'; });
    for(let i=0;i<riders.length;i++){ const r=riders[i];
      if(r.status==='free-rider'){ r.status='city'; r.carriedBy=null; }
      else if(r.status==='captive'){ r.status='killed'; r.carriedBy=null; }
    }
    mover.status='city'; mover.pos=null; mover.carriedBy=null;
    return {mover:mover, homecoming:true, hadCaptiveRiders:hadCaptiveRiders};
  } else {
    const occId=board[newPos];
    const willCapture=!!occId;
    resolveLanding(mover, newPos);
    return {mover:mover, homecoming:false, target:newPos, willCapture:willCapture};
  }
}

/* ============================ Turn flow ============================ */
function openingRoll(){
  phase='intro'; renderAll();
  let a=rollKernels().value, b=rollKernels().value, tries=0;
  while(a===b && tries<20){ a=rollKernels().value; b=rollKernels().value; tries++; }
  turn = (a>b) ? 'A' : 'B';
  document.getElementById('status').textContent = NAME[turn]+' goes first.';
  setTimeout(function(){ phase='preroll'; renderAll(); }, 1700);
}

function throwKernels(){
  if(phase!=='preroll'||busy||gameOver) return;
  busy=true; phase='rolling'; SND.throwK(); renderAll();
  let ticks=0;
  const iv=setInterval(function(){
    ticks++; renderKernels(true);
    if(ticks>=9){
      clearInterval(iv);
      const r=rollKernels(); rollValue=r.value; rollMarks=r.marks;
      legal=legalMovesFor(turn, rollValue);
      busy=false;
      if(!legal.enter && legal.advance.length===0){
        phase='pass'; renderAll();
        setTimeout(function(){ switchTurn(); }, 1300);
      } else {
        phase='choose'; renderAll();
      }
    }
  }, 70);
}

function performMove(kind, moverId){
  if(phase!=='choose'||busy) return;
  const mover=pieceById(moverId); const color=mover.color; const roll=rollValue;
  if(kind==='enter' && !legal.enter) return;
  if(kind==='advance' && legal.advance.indexOf(moverId)<0) return;
  busy=true; phase='animating';
  const colX=columnX(mover.col);
  let fromY, targetPos, homecoming=false;
  if(kind==='enter'){ fromY=cityCenterY(color); targetPos=(color==='A')?roll:(10-roll); }
  else { fromY=rowY(mover.pos); const np=(color==='A')?mover.pos+roll:mover.pos-roll; homecoming=(color==='A'&&np>=10)||(color==='B'&&np<=0); targetPos=np; }

  const g=document.getElementById('ghostG');

  if(homecoming){
    const riders=pieces.filter(function(q){ return q.carriedBy===moverId; });
    hiddenIds=new Set([moverId].concat(riders.map(function(q){ return q.id; })));
    renderAll(); clear(g);
    const node=ghostStone(g, colX, fromY, color, STONE_R);
    const enemyY = color==='A' ? cityCenterY('B') : cityCenterY('A');
    ghostAnim([{node:node, fx:colX, fy:fromY, tx:colX, ty:enemyY}], 560, function(){
      clear(g); const res=doAdvance(moverId,color,roll); hiddenIds=new Set();
      SND.home(); if(res.hadCaptiveRiders) SND.kill();
      renderAll(); afterMove(color);
    });
    return;
  }

  const occId=board[targetPos]; const occ=occId?pieceById(occId):null;
  const targetY=rowY(targetPos);
  hiddenIds=new Set([moverId]);
  renderAll(); clear(g);
  const mNode=ghostStone(g, colX, fromY, color, STONE_R);
  ghostAnim([{node:mNode, fx:colX, fy:fromY, tx:colX, ty:targetY}], 500, function(){
    if(occ){
      // phase 2: the captured stack slides horizontally to sit under the mover
      const capPieces=pieces.filter(function(q){ return q.id===occId || q.carriedBy===occId; });
      hiddenIds=new Set([moverId].concat(capPieces.map(function(q){ return q.id; })));
      renderAll(); clear(g);
      const occColX=columnX(occ.col);
      const shown=capPieces.slice(0,3);
      const ghosts=shown.map(function(cp,idx){
        const node=ghostStone(g, occColX, targetY+10+idx*8, cp.color, STONE_R-3, true);
        return {node:node, fx:occColX, fy:targetY+10+idx*8, tx:colX, ty:targetY+10+idx*8};
      });
      ghostStone(g, colX, targetY, color, STONE_R);   // captor sits on top of the sliding captives
      ghostAnim(ghosts, 340, function(){
        clear(g); doEnterOrAdvance(kind,moverId,color,roll); hiddenIds=new Set();
        SND.move(); SND.capture(); renderAll(); afterMove(color);
      });
    } else {
      clear(g); doEnterOrAdvance(kind,moverId,color,roll); hiddenIds=new Set();
      SND.move(); renderAll(); afterMove(color);
    }
  });
}
function doEnterOrAdvance(kind,moverId,color,roll){ if(kind==='enter') doEnter(color,roll,moverId); else doAdvance(moverId,color,roll); }

function afterMove(color){
  busy=false;   // release the input lock the move animation held
  const opp = color==='A' ? 'B' : 'A';
  if(isEliminated(opp)){ gameOver=true; winner=color; phase='gameover'; renderAll(); showBanner(color); return; }
  switchTurn();
}

function switchTurn(){
  turn = (turn==='A') ? 'B' : 'A';
  rollValue=null; rollMarks=null; legal={enter:false,advance:[]}; phase='preroll';
  renderAll();
}

function ghostStone(g, x, y, color, r, noShadow){
  const grp=E('g',{},g);
  if(!noShadow) E('ellipse',{cx:x,cy:y+r*0.66,rx:r*0.82,ry:r*0.2,fill:'rgba(0,0,0,0.22)'},grp);
  const sand = color==='A';
  E('circle',{cx:x,cy:y,r:r,fill: sand?'url(#sandstone)':'url(#basalt)',stroke: sand?'#7e4e2c':'#2f343a','stroke-width':1.5},grp);
  drawFlecks(grp,x,y,r, sand?SAND_FLECKS:BASALT_FLECKS);
  return grp;
}
function ghostAnim(items, duration, onDone){
  const steps=Math.max(8,Math.round(duration/16)); let i=0;
  const iv=setInterval(function(){
    i++; const t=Math.min(1,i/steps); const e = t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;
    for(let k=0;k<items.length;k++){ const it=items[k]; it.node.setAttribute('transform','translate('+((it.fx+(it.tx-it.fx)*e)-it.fx)+','+((it.fy+(it.ty-it.fy)*e)-it.fy)+')'); }
    if(t>=1){ clearInterval(iv); onDone(); }
  }, 16);
}

function showBanner(color){
  document.getElementById('bannertitle').textContent = NAME[color]+' wins!';
  document.getElementById('bannersub').textContent = NAME[color==='A'?'B':'A']+'\u2019s stones are all captured or destroyed.';
  document.getElementById('banner').classList.remove('hidden');
  SND.win();
}

/* ============================ Rendering ============================ */
function buildStatic(){
  const g=document.getElementById('staticG'); clear(g);
  E('rect',{x:0,y:0,width:VBW,height:VBH,rx:26,fill:'url(#wood)'},g);
  E('rect',{x:0,y:0,width:VBW,height:VBH,rx:26,fill:'url(#grain)'},g);

  // alternating lane spaces in the checkerboard's own colours
  for(let p=1;p<=9;p++){
    const y=rowY(p)-CELL_H/2; const dark=(p%2===0);
    E('rect',{x:BX,y:y,width:TW,height:CELL_H,fill: dark? '#6b4a30' : '#d8c19a'},g);
  }

  // cities (no captions)
  E('rect',{x:BX,y:P2_CITY_Y,width:TW,height:CITY_H,rx:10,fill:'rgba(0,0,0,0.18)',stroke:'rgba(255,225,170,0.15)','stroke-width':1.5},g);
  E('rect',{x:BX,y:P1_CITY_Y,width:TW,height:CITY_H,rx:10,fill:'rgba(0,0,0,0.18)',stroke:'rgba(255,225,170,0.15)','stroke-width':1.5},g);

  // recessed trays that hold the casting kernels, one down each side
  [{x:KL_X,ys:KL_Y},{x:KR_X,ys:KR_Y}].forEach(function(s){
    const top=Math.min.apply(null,s.ys)-KH/2-10, bot=Math.max.apply(null,s.ys)+KH/2+10;
    E('rect',{x:s.x-KW/2-8,y:top,width:KW+16,height:bot-top,rx:14,fill:'rgba(0,0,0,0.30)',stroke:'rgba(255,225,170,0.16)','stroke-width':1.5},g);
  });

  // play-field frame
  E('rect',{x:BX,y:P2_CITY_Y,width:TW,height:VBH-P2_CITY_Y-FR,fill:'none',stroke:'rgba(0,0,0,0.45)','stroke-width':3,rx:10},g);
}

function drawStone(parent,x,y,color,r,glow,noShadow){
  if(glow){
    E('circle',{cx:x,cy:y,r:r+14,fill:'url(#glowhalo)'},parent);
    E('circle',{cx:x,cy:y,r:r+3,fill:'none',stroke:'#ffd65c','stroke-width':4,opacity:0.92},parent);
  }
  if(!noShadow){
    E('ellipse',{cx:x,cy:y+r*0.66,rx:r*0.82,ry:r*0.2,fill:'rgba(0,0,0,0.22)'},parent);
  }
  const sand = color==='A';
  E('circle',{cx:x,cy:y,r:r,fill: sand?'url(#sandstone)':'url(#basalt)',stroke: sand?'#7e4e2c':'#2f343a','stroke-width':1.5},parent);
  drawFlecks(parent,x,y,r, sand?SAND_FLECKS:BASALT_FLECKS);
}

function renderCities(){
  const g=document.getElementById('cityG'); clear(g);
  ['A','B'].forEach(function(color){
    const cy=cityCenterY(color);
    const entryLegal=(phase==='choose'&&turn===color&&legal.enter);
    const cityPieces=pieces.filter(function(p){ return p.color===color && p.status==='city'; });
    cityPieces.forEach(function(p){
      if(hiddenIds.has(p.id)) return;
      const x=columnX(p.col);
      const wrap=E('g',{},g);
      drawStone(wrap, x, cy, color, STONE_R, entryLegal);
      if(entryLegal){ wrap.setAttribute('style','cursor:pointer'); wrap.onclick=(function(id){ return function(){ performMove('enter', id); }; })(p.id); }
    });
  });
}

function renderTrack(){
  const g=document.getElementById('trackG'); clear(g);
  for(let p=1;p<=9;p++){
    const occId=board[p]; if(!occId || hiddenIds.has(occId)) continue;
    const top=pieceById(occId);
    const captives=pieces.filter(function(q){ return q.carriedBy===occId; });
    const x=columnX(top.col), y=rowY(p);
    const shown=Math.min(captives.length,3);
    for(let i=shown-1;i>=0;i--){ drawStone(g, x, y+10+i*8, captives[i].color, STONE_R-3, false, true); }  // deepest first; rims stay visible beneath the captor
    if(captives.length>3){ const lab=E('text',{x:x+22,y:y-18,'font-size':13,'font-weight':700,fill:'#ffe9a8'},g); lab.textContent='+'+(captives.length-3); }
    const movable=(phase==='choose'&&turn===top.color&&legal.advance.indexOf(occId)>=0);
    const wrap=E('g',{},g);
    drawStone(wrap, x, y, top.color, STONE_R, movable);
    if(movable){ wrap.setAttribute('style','cursor:pointer'); wrap.onclick=(function(id){ return function(){ performMove('advance', id); }; })(occId); }
  }
}

function renderKernels(tumbling){
  const g=document.getElementById('kernelG'); clear(g);
  drawStrip('A', KL_X, KL_Y, tumbling);   // Sand throws on the left, from the bottom
  drawStrip('B', KR_X, KR_Y, tumbling);   // Black throws on the right, from the top
}
function drawStrip(color, x, ys, tumbling){
  const g=document.getElementById('kernelG');
  const live = (color===turn) && !gameOver && (phase==='preroll'||phase==='rolling'||phase==='choose'||phase==='animating');
  const ready = live && phase==='preroll' && !busy;
  const top=Math.min.apply(null,ys), bot=Math.max.apply(null,ys);
  if(ready){
    E('rect',{x:x-21,y:top-KH/2-7,width:42,height:(bot-top)+KH+14,rx:15,fill:'url(#glowhalo)','class':'kglow'},g);
  }
  for(let i=0;i<4;i++){
    let dark;
    if(live && tumbling) dark=Math.random()<0.5;
    else if(live && rollMarks) dark=rollMarks[i];
    else dark=false;                       // unrolled corn rests blank-side up
    const op = live ? 1 : 0.3;             // the off-turn strip sits dim
    E('rect',{x:x-KW/2,y:ys[i]-KH/2,width:KW,height:KH,rx:11,
      fill: dark?'url(#kDark)':'url(#kLight)',
      stroke: dark?'#7c5f30':'#33240f','stroke-width': dark?2.2:2.6,
      opacity:op,filter:'url(#psh)'},g);
    if(ready){   // crisp pulsing gold outline so the kernels-to-throw read clearly
      E('rect',{x:x-KW/2,y:ys[i]-KH/2,width:KW,height:KH,rx:11,fill:'none',stroke:'#ffd75e','stroke-width':3.5,'class':'kpulse'},g);
    }
  }
  if(ready){   // only the active player's strip can be tapped, so only one row rolls
    const hit=E('rect',{x:x-KW/2-8,y:top-KH/2-11,width:KW+16,height:(bot-top)+KH+22,fill:'transparent',style:'cursor:pointer'},g);
    hit.onclick=throwKernels;
  }
}

function updateStatus(){
  const el=document.getElementById('status');
  if(gameOver){ el.textContent = NAME[winner]+' wins.'; return; }
  if(phase==='setup' || phase==='intro') return;
  const who = NAME[turn];
  if(phase==='preroll'){ el.textContent = who+' \u2014 tap the kernels to throw.'; return; }
  if(phase==='rolling'){ el.textContent = who+' \u2014 throwing\u2026'; return; }
  if(phase==='pass'){ el.textContent = who+' has no legal move \u2014 turn passes.'; return; }
  if(phase==='choose' || phase==='animating'){
    const note = (rollMarks && rollMarks.every(function(m){ return m; })) ? ' (all blank \u2014 a throw of 5)' : '';
    el.textContent = who+' threw '+rollValue+note+' \u2014 tap a glowing stone to move it.';
  }
}

function renderAll(){
  renderKernels(false); renderCities(); renderTrack(); updateStatus();
}

/* ============================ Init ============================ */
function init(){
  buildStatic();
  document.getElementById('startbtn').onclick=function(){ ac(); newGame(); };
  document.getElementById('againbtn').onclick=function(){
    document.getElementById('banner').classList.add('hidden');
    document.getElementById('setup').classList.remove('hidden');
  };
}
init();
</script>
