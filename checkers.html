<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Checkers</title>
<style>
  :root{
    --wood:       #5a3d28;
    --wood-dark:  #3a2616;
    --wood-edge:  #74522f;
    --square-light:#d8c19a;
    --square-dark: #6b4a30;
    --brass:      #cda434;
    --gold:       #ffd75e;
    --gold-soft:  #ffe79a;
    --text:       #e9e3d4;
    --text-dim:   #a59c86;
    /* Square size: the smaller of the width budget (after reserving room for the
       trays) and the height budget (incl. the deselect strip) — so it never scrolls. */
    --cell: clamp(24px, min(calc((100vw - 36px) / 8.9), calc((100vh - 260px) / 8.9)), 60px);
    --wood-fill:
      repeating-linear-gradient(64deg, rgba(0,0,0,.10) 0 6px, rgba(255,255,255,.025) 6px 12px),
      linear-gradient(150deg, var(--wood-edge), var(--wood) 36%, var(--wood-dark));
    --font-display:'Iowan Old Style','Palatino Linotype',Palatino,'Hoefler Text',Georgia,'Times New Roman',serif;
    --font-body:'Avenir Next','Segoe UI',Roboto,system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }

  body{
    min-height:100vh;
    font-family:var(--font-body);
    color:var(--text);
    background:radial-gradient(130% 95% at 50% 22%, #2b303b 0%, #1b1f28 48%, #13151b 100%);
    background-attachment:fixed;
    display:flex; flex-direction:column; align-items:center;
    padding:clamp(18px,4vw,40px) 16px;
    -webkit-tap-highlight-color:transparent;
  }

  :focus-visible{ outline:2px solid var(--gold); outline-offset:3px; border-radius:4px; }

  /* ---- Table ---- */
  .table{ display:flex; flex-direction:column; align-items:center; gap:14px; width:100%; }

  /* ---- Seats (wood tray panels; active one glows) ---- */
  .seat{
    width:min(100%, calc(var(--cell)*8 + 40px));
    display:flex; align-items:center; justify-content:center;
    min-height:46px; padding:8px 15px; border-radius:12px;
    background:var(--wood-fill);
    border:1px solid rgba(0,0,0,.34);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.09), 0 2px 6px rgba(0,0,0,.35);
    transition:border-color .25s, box-shadow .25s;
  }
  .seat.is-active{
    border-color:rgba(255,215,94,.55);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.1),
               0 0 0 1px rgba(255,215,94,.4), 0 0 22px rgba(205,164,52,.3),
               0 2px 6px rgba(0,0,0,.35);
  }
  .tray{ display:flex; align-items:center; gap:10px; max-width:100%; }
  .chips{ display:flex; flex-wrap:wrap; gap:3px; justify-content:center; max-width:calc(var(--cell)*7); }
  .chip{
    width:14px; height:14px; border-radius:50%;
    box-shadow:inset 0 0 0 1.5px rgba(0,0,0,.3), 0 1px 2px rgba(0,0,0,.5);
  }
  .chip--red{   background:radial-gradient(circle at 36% 30%, #ef6a5f, #b8332a); }
  .chip--black{ background:radial-gradient(circle at 36% 30%, #4a4a53, #16161c); }
  .tray-count{
    font-variant-numeric:tabular-nums; font-weight:700; font-size:15px;
    color:#f3ead8; text-shadow:0 1px 1px rgba(0,0,0,.55);
    min-width:16px; text-align:center;
  }

  /* ---- Board ---- */
  .boardwrap{ position:relative; display:flex; flex-direction:column; align-items:center; }
  .frame{
    padding:calc(var(--cell)*0.36); border-radius:14px;
    background:var(--wood-fill);
    box-shadow:
      0 1px 0 rgba(255,255,255,.10) inset,
      0 calc(var(--cell)*0.22) calc(var(--cell)*0.5) rgba(0,0,0,.55),
      0 2px 3px rgba(0,0,0,.5);
  }
  .board{
    position:relative; width:calc(var(--cell)*8); height:calc(var(--cell)*8);
    border-radius:5px; overflow:hidden;
    box-shadow:0 0 0 2px rgba(0,0,0,.4), inset 0 0 calc(var(--cell)*0.5) rgba(0,0,0,.45);
  }
  .squares{
    display:grid;
    grid-template-columns:repeat(8, var(--cell));
    grid-template-rows:repeat(8, var(--cell));
    width:100%; height:100%;
  }
  .square{ position:relative; width:var(--cell); height:var(--cell); }
  .square--light{ background:radial-gradient(120% 120% at 30% 25%, #e2cda7, var(--square-light)); }
  .square--dark{  background:radial-gradient(120% 120% at 30% 25%, #79553a, var(--square-dark)); }

  /* destination dot — the SAME marker for a plain move or a jump landing */
  .square::after{
    content:''; position:absolute; left:50%; top:50%;
    transform:translate(-50%,-50%); border-radius:50%;
    opacity:0; pointer-events:none; transition:opacity .14s;
  }
  .square.is-move::after{
    width:calc(var(--cell)*0.44); height:calc(var(--cell)*0.44);
    background:radial-gradient(circle, var(--gold-soft), #f3bb33 72%);
    box-shadow:0 0 calc(var(--cell)*0.32) rgba(255,205,80,.8);
    opacity:1; animation:hint-pulse 1.4s ease-in-out infinite;
  }
  @keyframes hint-pulse{
    0%,100%{ transform:translate(-50%,-50%) scale(1); }
    50%    { transform:translate(-50%,-50%) scale(1.1); }
  }
  /* keyboard-navigation cursor (only visible while using the keyboard) */
  .square.is-cursor{ outline:3px solid var(--gold); outline-offset:-3px; z-index:3; }

  /* ---- Pieces ----
     Outer .piece carries POSITION via transform:translate (GPU-composited slide).
     Inner .piece__body carries EFFECTS (lift / capture) so the two transforms
     never collide — this is what fixes the vanishing-after-move bug. */
  .pieces{ position:absolute; inset:0; pointer-events:none; }
  .piece{
    position:absolute; top:0; left:0;
    width:calc(var(--cell)*0.78); height:calc(var(--cell)*0.78);
    cursor:pointer; pointer-events:auto;
    transition:transform .28s cubic-bezier(.22,.68,.2,1);
  }
  .piece.is-moving{ z-index:7; }
  .piece.is-selected{ z-index:6; }
  .piece.is-captured{ z-index:1; }

  .piece__body{
    position:absolute; inset:0; border-radius:50%;
    transition:transform .16s ease, opacity .24s ease;
  }
  .piece__body--red{
    background:radial-gradient(circle at 35% 28%, #ef6a5f, #cf3b30 46%, #8f1f17 100%);
    box-shadow:
      inset 0 0 0 calc(var(--cell)*0.055) rgba(80,8,4,.4),
      inset 0 calc(var(--cell)*-0.05) calc(var(--cell)*0.06) rgba(70,8,4,.45),
      inset 0 calc(var(--cell)*0.05) calc(var(--cell)*0.06) rgba(255,255,255,.35),
      0 calc(var(--cell)*0.06) calc(var(--cell)*0.09) rgba(0,0,0,.45);
  }
  .piece__body--black{
    background:radial-gradient(circle at 35% 28%, #4c4c55, #232329 46%, #0c0c11 100%);
    box-shadow:
      inset 0 0 0 calc(var(--cell)*0.055) rgba(0,0,0,.42),
      inset 0 calc(var(--cell)*-0.05) calc(var(--cell)*0.06) rgba(0,0,0,.5),
      inset 0 calc(var(--cell)*0.05) calc(var(--cell)*0.06) rgba(255,255,255,.15),
      0 calc(var(--cell)*0.06) calc(var(--cell)*0.09) rgba(0,0,0,.5);
  }
  /* glow ring — bolder so selectable / selected checkers clearly stand out */
  .piece__body::after{
    content:''; position:absolute; inset:calc(var(--cell)*-0.05);
    border-radius:50%; pointer-events:none; transition:box-shadow .2s;
    box-shadow:0 0 0 0 transparent;
  }
  .piece.is-movable .piece__body::after{
    box-shadow:0 0 0 3px rgba(255,214,92,.92), 0 0 calc(var(--cell)*0.3) rgba(255,200,70,.6);
  }
  .piece.is-selected .piece__body{ transform:translateY(-10%) scale(1.06); }
  .piece.is-selected .piece__body::after{
    box-shadow:0 0 0 4px var(--gold), 0 0 calc(var(--cell)*0.42) rgba(255,200,70,.78);
  }
  .piece.is-captured .piece__body{ transform:scale(0); opacity:0; }

  /* X over an enemy piece that the selected checker can jump */
  .piece.is-target .piece__body::before{
    content:''; position:absolute; inset:13%; z-index:3; pointer-events:none;
    background:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M7 7 17 17 M17 7 7 17' fill='none' stroke='black' stroke-opacity='0.55' stroke-width='5.5' stroke-linecap='round'/><path d='M7 7 17 17 M17 7 7 17' fill='none' stroke='%23fff4e0' stroke-width='3' stroke-linecap='round'/></svg>") center/contain no-repeat;
    animation:x-pulse 1.4s ease-in-out infinite;
  }
  @keyframes x-pulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.12); } }

  /* king crown (gold, reads on both colors) */
  .crown{
    position:absolute; left:21%; top:27%; width:58%; height:auto;
    fill:#ebc650; stroke:rgba(0,0,0,.3); stroke-width:.4; stroke-linejoin:round;
    filter:drop-shadow(0 1px 1px rgba(0,0,0,.45));
    pointer-events:none; animation:king-mark .35s ease;
  }
  @keyframes king-mark{ from{ transform:scale(.35); opacity:0; } to{ transform:scale(1); opacity:1; } }

  /* ---- Win overlay (result only) ---- */
  .banner{
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(15,17,22,.74); backdrop-filter:blur(3px); border-radius:14px; padding:18px;
  }
  .banner.show{ display:flex; animation:fade .25s ease; }
  @keyframes fade{ from{ opacity:0; } to{ opacity:1; } }
  .result{
    font-family:var(--font-display); font-size:clamp(28px,7vw,42px);
    color:#f6efe0; margin:0; text-align:center;
  }

  /* ---- Subtle deselect button (its strip is always reserved below the board,
          so showing it never shifts the layout or causes a scroll) ---- */
  .deselect{
    margin-top:12px;
    display:inline-flex; align-items:center; gap:7px;
    padding:7px 15px; border-radius:999px;
    font-family:var(--font-body); font-size:12.5px; font-weight:600; letter-spacing:.03em;
    color:var(--text-dim);
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.12);
    cursor:pointer; -webkit-appearance:none; appearance:none;
    opacity:0; pointer-events:none;
    transition:opacity .2s ease, color .2s, border-color .2s, background .2s;
  }
  .deselect.show{ opacity:1; pointer-events:auto; }
  .deselect.show:hover{ opacity:1; color:var(--text); border-color:rgba(255,215,94,.5); background:rgba(255,255,255,.07); }
  .deselect svg{ width:12px; height:12px; }

  /* ---- small portrait screens ---- */
  @media (max-width:560px){ .chips{ max-width:calc(var(--cell)*6); } .seat{ padding:8px 11px; } }

  /* ---- LANDSCAPE: trays become wood rails hugging the left & right screen edges ---- */
  @media (orientation: landscape){
    :root{
      --cell: clamp(24px, min(calc((100vw - 330px) / 8.9), calc((100vh - 96px) / 8.9)), 60px);
    }
    body{ padding:clamp(10px,2vh,24px) 0; justify-content:center; }
    .table{ flex-direction:row; align-items:stretch; justify-content:space-between; gap:0; width:100%; }
    .seat{ width:clamp(80px,13vw,150px); flex-direction:column; }
    #seat-red{ border-radius:0 14px 14px 0; }    /* flush to the left edge */
    #seat-black{ border-radius:14px 0 0 14px; }   /* flush to the right edge */
    .tray{ flex-direction:column; gap:8px; }
    .chips{ max-width:100%; }
  }

  @media (prefers-reduced-motion:reduce){
    .piece, .piece__body, .square::after, .seat, .piece__body::after, .deselect{ transition:none !important; }
    .crown, .banner.show,
    .square.is-move::after,
    .piece.is-target .piece__body::before{ animation:none !important; }
  }
  .overlay{ position:fixed; inset:0; background:rgba(10,12,16,0.82); display:flex; align-items:center; justify-content:center; z-index:50; -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px); }
  .overlay.hidden{ display:none; }
  .card{ background:linear-gradient(160deg,#2c2620,#1c1813); border:1px solid rgba(255,225,170,.18); border-radius:18px; padding:30px 34px; max-width:400px; text-align:center; box-shadow:0 18px 50px rgba(0,0,0,.6); }
  .card h1{ font-family:var(--font-display, "Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif); font-size:28px; margin:0 0 4px; color:var(--gold); letter-spacing:.5px; }
  .card .sub{ color:#b9a978; font-size:14px; margin-bottom:12px; }
  .card p{ color:var(--text); font-size:13.5px; line-height:1.5; margin:0 0 6px; }
  .start{ font-family:inherit; font-size:13.5px; font-weight:700; letter-spacing:0.02em; padding:9px 22px; border-radius:9px; border:1.5px solid rgba(255,215,94,0.45); background:linear-gradient(145deg,#3a4150,#272c36); color:#ffe9a8; cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,0.4); margin-top:8px; -webkit-appearance:none; appearance:none; }
  .start:hover{ border-color:rgba(255,215,94,0.85); }
  .fsbtn{ position:absolute; bottom:16px; right:16px; z-index:5; width:44px; height:44px; border-radius:11px; border:1.5px solid rgba(255,215,94,0.45); background:linear-gradient(145deg,#3a4150,#272c36); color:#ffe9a8; cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,0.4); -webkit-appearance:none; appearance:none; }
  .fsbtn:hover{ border-color:rgba(255,215,94,0.85); }
  .fsbtn svg{ position:absolute; top:50%; left:50%; -webkit-transform:translate(-50%,-50%); transform:translate(-50%,-50%); width:24px; height:24px; display:block; }
  .fsbtn .fs-exit{ display:none; }
  .fsbtn.fs-on .fs-enter{ display:none; }
  .fsbtn.fs-on .fs-exit{ display:block; }
  .gicon-hero{display:flex;justify-content:center;margin:6px 0 16px;}
  .gicon-hero svg{width:88px;height:88px;}
</style>
</head>
<body>
<div class="overlay" id="setup">
  <button class="fsbtn" id="fsbtn" type="button" aria-label="Toggle fullscreen">
    <svg class="fs-enter" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 8 V3 H8 M21 8 V3 H16 M3 16 V21 H8 M21 16 V21 H16" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <svg class="fs-exit" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 3 V8 H3 M16 3 V8 H21 M8 21 V16 H3 M16 21 V16 H21" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <div class="card">
    <h1>Checkers</h1>
    <p class="sub">Capture to win</p>
    <p>Move diagonally and jump your opponent’s pieces to capture them. Take all their pieces, or leave them with no move, to win.</p>
    <div class="gicon-hero"><svg id="gameicon" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><rect x="7.00" y="7.00" width="50.00" height="50.00" rx="4" fill="#d8a24e"/><rect x="13.25" y="7.00" width="6.25" height="6.25" fill="#4a3016"/><rect x="25.75" y="7.00" width="6.25" height="6.25" fill="#4a3016"/><rect x="38.25" y="7.00" width="6.25" height="6.25" fill="#4a3016"/><rect x="50.75" y="7.00" width="6.25" height="6.25" fill="#4a3016"/><rect x="7.00" y="13.25" width="6.25" height="6.25" fill="#4a3016"/><rect x="19.50" y="13.25" width="6.25" height="6.25" fill="#4a3016"/><rect x="32.00" y="13.25" width="6.25" height="6.25" fill="#4a3016"/><rect x="44.50" y="13.25" width="6.25" height="6.25" fill="#4a3016"/><rect x="13.25" y="19.50" width="6.25" height="6.25" fill="#4a3016"/><rect x="25.75" y="19.50" width="6.25" height="6.25" fill="#4a3016"/><rect x="38.25" y="19.50" width="6.25" height="6.25" fill="#4a3016"/><rect x="50.75" y="19.50" width="6.25" height="6.25" fill="#4a3016"/><rect x="7.00" y="25.75" width="6.25" height="6.25" fill="#4a3016"/><rect x="19.50" y="25.75" width="6.25" height="6.25" fill="#4a3016"/><rect x="32.00" y="25.75" width="6.25" height="6.25" fill="#4a3016"/><rect x="44.50" y="25.75" width="6.25" height="6.25" fill="#4a3016"/><rect x="13.25" y="32.00" width="6.25" height="6.25" fill="#4a3016"/><rect x="25.75" y="32.00" width="6.25" height="6.25" fill="#4a3016"/><rect x="38.25" y="32.00" width="6.25" height="6.25" fill="#4a3016"/><rect x="50.75" y="32.00" width="6.25" height="6.25" fill="#4a3016"/><rect x="7.00" y="38.25" width="6.25" height="6.25" fill="#4a3016"/><rect x="19.50" y="38.25" width="6.25" height="6.25" fill="#4a3016"/><rect x="32.00" y="38.25" width="6.25" height="6.25" fill="#4a3016"/><rect x="44.50" y="38.25" width="6.25" height="6.25" fill="#4a3016"/><rect x="13.25" y="44.50" width="6.25" height="6.25" fill="#4a3016"/><rect x="25.75" y="44.50" width="6.25" height="6.25" fill="#4a3016"/><rect x="38.25" y="44.50" width="6.25" height="6.25" fill="#4a3016"/><rect x="50.75" y="44.50" width="6.25" height="6.25" fill="#4a3016"/><rect x="7.00" y="50.75" width="6.25" height="6.25" fill="#4a3016"/><rect x="19.50" y="50.75" width="6.25" height="6.25" fill="#4a3016"/><rect x="32.00" y="50.75" width="6.25" height="6.25" fill="#4a3016"/><rect x="44.50" y="50.75" width="6.25" height="6.25" fill="#4a3016"/><rect x="7.00" y="7.00" width="50.00" height="50.00" rx="4" fill="none" stroke="#d8a24e" stroke-width="1.7"/></svg></div>
    <button class="start" id="startbtn" type="button">Start Game</button>
  </div>
</div>

  <main class="table">
    <!-- Red's captured pieces (top in portrait, left rail in landscape) -->
    <div class="seat" id="seat-red" aria-label="Red's captured pieces">
      <div class="tray">
        <div class="chips" id="chips-red"></div>
        <span class="tray-count" id="count-red">0</span>
      </div>
    </div>

    <div class="boardwrap">
      <div class="frame">
        <div class="board" id="board" tabindex="0"
             role="application"
             aria-label="Checkers board. Use arrow keys to move the cursor, Enter or Space to select and move, Escape to deselect.">
          <div class="squares" id="squares"></div>
          <div class="pieces" id="pieces"></div>
          <div class="banner" id="banner"><p class="result" id="result"></p></div>
        </div>
      </div>
    </div>

    <!-- Black's captured pieces (bottom in portrait, right rail in landscape) -->
    <div class="seat" id="seat-black" aria-label="Black's captured pieces">
      <div class="tray">
        <div class="chips" id="chips-black"></div>
        <span class="tray-count" id="count-black">0</span>
      </div>
    </div>
  </main>

  <button class="deselect" id="deselect" type="button" disabled aria-label="Deselect the current piece">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6 L18 18 M18 6 L6 18" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/></svg>
    Deselect
  </button>

<script>
"use strict";
document.addEventListener("DOMContentLoaded", function(){

  /* ---------------- geometry ---------------- */
  const SIZE = 8;
  // Red on top (rows 0-2) moves DOWN, promotes on row 7.
  // Black on the bottom (rows 5-7) moves UP, promotes on row 0, moves first.
  const DIRS = {
    redMan:   [[1,-1],[1,1]],
    blackMan: [[-1,-1],[-1,1]],
    king:     [[1,-1],[1,1],[-1,-1],[-1,1]]
  };
  const PROMO_ROW = { red: 7, black: 0 };

  const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const MOVE_MS = reduceMotion ? 0 : 290;

  const CROWN_SVG =
    '<svg class="crown" viewBox="0 0 24 16" aria-hidden="true">' +
      '<rect x="2.8" y="12.2" width="18.4" height="3" rx="0.9"/>' +
      '<path d="M3 12.6 L5.8 5.5 L9.5 9.2 L12 4 L14.5 9.2 L18.2 5.5 L21 12.6 Z"/>' +
      '<circle cx="5.8" cy="5" r="1.05"/>' +
      '<circle cx="12" cy="3.5" r="1.3"/>' +
      '<circle cx="18.2" cy="5" r="1.05"/>' +
    '</svg>';

  /* ---------------- DOM ---------------- */
  const squaresEl = document.getElementById("squares");
  const piecesEl  = document.getElementById("pieces");
  const boardEl   = document.getElementById("board");
  const bannerEl  = document.getElementById("banner");
  const resultEl  = document.getElementById("result");
  const deselectBtn = document.getElementById("deselect");

  const seatEls  = { red: document.getElementById("seat-red"),  black: document.getElementById("seat-black") };
  const chipEls  = { red: document.getElementById("chips-red"), black: document.getElementById("chips-black") };
  const countEls = { red: document.getElementById("count-red"), black: document.getElementById("count-black") };

  /* ---------------- state ---------------- */
  let board, turn, selected, chainPiece;
  let currentMoves, currentCaptures, captured;
  let gameOver, locked;
  let cursor = {r:6, c:1}, cursorShown = false, cursorEl = null;

  const pieceEls = new Map();   // id -> outer .piece element
  const squareEls = [];         // squareEls[r][c]
  let pieceSeq = 0;

  /* ---------------- sound (always on; all synthesized, no files) ---------------- */
  let actx = null, master = null;
  function audio(){
    if(!actx){
      const AC = window.AudioContext || window.webkitAudioContext;
      if(!AC) return null;
      actx = new AC();
      master = actx.createGain();
      master.gain.value = 0.45;
      master.connect(actx.destination);
    }
    if(actx.state === "suspended") actx.resume();
    return actx;
  }
  function tone(o){
    const ctx = audio(); if(!ctx) return;
    const t0 = ctx.currentTime + (o.delay || 0);
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = o.type || "triangle";
    osc.frequency.setValueAtTime(o.freq, t0);
    if(o.to) osc.frequency.exponentialRampToValueAtTime(o.to, t0 + o.dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(o.vol, t0 + (o.attack || 0.005));
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + o.dur);
    osc.connect(g).connect(master);
    osc.start(t0); osc.stop(t0 + o.dur + 0.03);
  }
  function noise(o){
    const ctx = audio(); if(!ctx) return;
    const t0 = ctx.currentTime + (o.delay || 0);
    const len = Math.floor(ctx.sampleRate * o.dur);
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i] = Math.random()*2 - 1;
    const src = ctx.createBufferSource(); src.buffer = buf;
    const filt = ctx.createBiquadFilter();
    filt.type = o.filter || "bandpass";
    filt.frequency.value = o.freq || 1400; filt.Q.value = o.q || 0.8;
    const g = ctx.createGain();
    g.gain.setValueAtTime(o.vol, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + o.dur);
    src.connect(filt).connect(g).connect(master);
    src.start(t0); src.stop(t0 + o.dur + 0.02);
  }
  const Sound = {
    select(){ tone({freq:430, to:520, dur:0.06, vol:0.12, type:"sine"}); },
    deselect(){ tone({freq:340, to:230, dur:0.09, vol:0.12, type:"sine"}); },
    move(){
      tone({freq:175, to:104, dur:0.13, vol:0.5, type:"triangle"});
      noise({freq:2600, dur:0.025, vol:0.16, filter:"highpass"}); },
    capture(){
      tone({freq:128, to:62, dur:0.2, vol:0.6, type:"triangle"});
      noise({freq:1500, dur:0.09, vol:0.34, q:0.6});
      tone({freq:300, to:120, dur:0.16, vol:0.18, type:"sawtooth", delay:0.02}); },
    king(){
      [523,659,784].forEach((f,i)=> tone({freq:f, dur:0.5, vol:0.3, type:"triangle", delay:i*0.085, attack:0.01}));
      tone({freq:1568, dur:0.6, vol:0.12, type:"sine", delay:0.17}); },
    win(){
      [523,659,784,1047].forEach((f,i)=> tone({freq:f, dur:0.55, vol:0.32, type:"triangle", delay:i*0.1, attack:0.01}));
      tone({freq:262, dur:0.8, vol:0.2, type:"sine", delay:0.1}); },
    nudge(){ tone({freq:96, to:72, dur:0.12, vol:0.22, type:"sine"}); }
  };

  /* ---------------- helpers ---------------- */
  const inB = (r,c) => r>=0 && r<SIZE && c>=0 && c<SIZE;
  const isDark = (r,c) => (r + c) % 2 === 1;
  const other = col => col === "red" ? "black" : "red";
  const key = (r,c) => r + "," + c;
  const cap = s => s.charAt(0).toUpperCase() + s.slice(1);

  function dirsFor(p){ return p.king ? DIRS.king : (p.color === "red" ? DIRS.redMan : DIRS.blackMan); }
  function capturesFrom(r,c,p){
    const out = [];
    for(const [dr,dc] of dirsFor(p)){
      const mr=r+dr, mc=c+dc, lr=r+2*dr, lc=c+2*dc;
      if(inB(lr,lc) && board[lr][lc] === null){
        const mid = board[mr][mc];
        if(mid && mid.color !== p.color) out.push({r:lr, c:lc, jr:mr, jc:mc});
      }
    }
    return out;
  }
  function movesFrom(r,c,p){
    const out = [];
    for(const [dr,dc] of dirsFor(p)){
      const nr=r+dr, nc=c+dc;
      if(inB(nr,nc) && board[nr][nc] === null) out.push({r:nr, c:nc});
    }
    return out;
  }
  function colorHasCapture(color){
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
      const p = board[r][c];
      if(p && p.color === color && capturesFrom(r,c,p).length) return true;
    }
    return false;
  }
  function colorHasMove(color){
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
      const p = board[r][c];
      if(p && p.color === color && (capturesFrom(r,c,p).length || movesFrom(r,c,p).length)) return true;
    }
    return false;
  }
  // Forced jumps always on: if any capture exists, only captures are legal.
  function legalFor(r,c){
    const p = board[r][c];
    if(!p) return {moves:[], captures:[]};
    const caps = capturesFrom(r,c,p);
    if(chainPiece){
      if(chainPiece.r === r && chainPiece.c === c) return {moves:[], captures:caps};
      return {moves:[], captures:[]};
    }
    if(colorHasCapture(turn)) return {moves:[], captures:caps};
    return {moves:movesFrom(r,c,p), captures:caps};
  }
  function findPiece(id){
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
      const p = board[r][c];
      if(p && p.id === id) return {r,c,p};
    }
    return null;
  }
  function pieceTransform(r,c){
    return "translate(calc(var(--cell) * " + c + " + var(--cell) * 0.11), " +
                      "calc(var(--cell) * " + r + " + var(--cell) * 0.11))";
  }

  /* ---------------- rendering ---------------- */
  function buildSquares(){
    squaresEl.innerHTML = "";
    for(let r=0;r<SIZE;r++){
      squareEls[r] = [];
      for(let c=0;c<SIZE;c++){
        const sq = document.createElement("div");
        sq.className = "square " + (isDark(r,c) ? "square--dark" : "square--light");
        sq.dataset.r = r; sq.dataset.c = c;
        sq.addEventListener("pointerdown", () => onSquareClick(r,c));
        squaresEl.appendChild(sq);
        squareEls[r][c] = sq;
      }
    }
  }
  function makePiece(color, r, c){
    const id = "p" + (pieceSeq++);
    board[r][c] = {id, color, king:false};
    const el = document.createElement("div");
    el.className = "piece";
    el.dataset.id = id;
    el.style.transform = pieceTransform(r, c);   // set before append: no first-paint slide
    const body = document.createElement("div");
    body.className = "piece__body piece__body--" + color;
    el.appendChild(body);
    el.addEventListener("pointerdown", e => { e.stopPropagation(); onPieceClick(id); });
    piecesEl.appendChild(el);
    pieceEls.set(id, el);
  }
  function movePieceEl(id, r, c){
    const el = pieceEls.get(id);
    if(el) el.style.transform = pieceTransform(r, c);
  }
  function kingify(id){
    const el = pieceEls.get(id);
    if(!el || el.classList.contains("is-king")) return;
    el.classList.add("is-king");
    const body = el.querySelector(".piece__body");
    if(body && !body.querySelector(".crown")) body.insertAdjacentHTML("beforeend", CROWN_SVG);
  }
  function clearHints(){
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++)
      squareEls[r][c].classList.remove("is-move");
  }
  function showHints(){
    clearHints();
    pieceEls.forEach(el => el.classList.remove("is-target"));
    // same dot on every landing square (plain move or jump landing)
    currentMoves.forEach(k => { const [r,c] = k.split(",").map(Number); squareEls[r][c].classList.add("is-move"); });
    currentCaptures.forEach(m => {
      squareEls[m.r][m.c].classList.add("is-move");
      const victim = board[m.jr][m.jc];                 // X over the piece to be taken
      if(victim){ const vEl = pieceEls.get(victim.id); if(vEl) vEl.classList.add("is-target"); }
    });
  }
  function clearSelectionVisuals(){
    pieceEls.forEach(el => el.classList.remove("is-selected","is-target"));
    clearHints();
  }
  function updateMovable(){
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
      const p = board[r][c];
      if(!p) continue;
      const el = pieceEls.get(p.id);
      if(!el) continue;
      let movable = false;
      if(!gameOver && !selected && p.color === turn){
        const lg = legalFor(r,c);
        movable = lg.moves.length > 0 || lg.captures.length > 0;
      }
      el.classList.toggle("is-movable", movable);
    }
  }
  function renderTrays(){
    [["red","black"],["black","red"]].forEach(([who, chipColor]) => {
      const n = captured[who];
      countEls[who].textContent = n;
      const box = chipEls[who];
      box.innerHTML = "";
      for(let i=0;i<n;i++){
        const chip = document.createElement("span");
        chip.className = "chip chip--" + chipColor;
        box.appendChild(chip);
      }
    });
  }
  function refreshSeats(){
    seatEls.red.classList.toggle("is-active", !gameOver && turn === "red");
    seatEls.black.classList.toggle("is-active", !gameOver && turn === "black");
  }
  // deselect button: only for a fresh, pre-move selection (not mid-jump / mid-animation)
  function refreshDeselect(){
    const show = !!selected && !chainPiece && !gameOver && !locked;
    deselectBtn.classList.toggle("show", show);
    deselectBtn.disabled = !show;
  }

  /* cursor is a KEYBOARD-ONLY affordance: invisible until an arrow key is pressed,
     and any mouse interaction hides it again. */
  function paintCursor(){
    if(cursorEl){ cursorEl.classList.remove("is-cursor"); cursorEl = null; }
    if(cursorShown){ cursorEl = squareEls[cursor.r][cursor.c]; cursorEl.classList.add("is-cursor"); }
  }
  function setCursor(r,c){ cursor = {r,c}; paintCursor(); }
  function hideCursor(){ if(cursorShown){ cursorShown = false; paintCursor(); } }

  /* ---------------- interaction ----------------
     Selection is COMMITTED: once a piece is chosen you can only move that piece,
     unless you explicitly deselect (button or Esc) before it has moved. */
  function selectPiece(r,c){
    const p = board[r][c];
    const lg = legalFor(r,c);
    if(lg.moves.length === 0 && lg.captures.length === 0){ Sound.nudge(); return; }
    selected = {r,c};
    currentMoves = new Set(lg.moves.map(m => key(m.r,m.c)));
    currentCaptures = lg.captures;
    clearSelectionVisuals();
    pieceEls.get(p.id).classList.add("is-selected");
    showHints();
    updateMovable();
    setCursor(r,c);
    refreshDeselect();
    Sound.select();
  }
  function clearSelection(){   // internal cleanup (end of game / new game)
    selected = null; currentMoves = new Set(); currentCaptures = [];
    clearSelectionVisuals();
  }
  function userDeselect(){     // explicit cancel via the button or Esc
    if(!selected || chainPiece || locked || gameOver) return;
    clearSelection();
    updateMovable();           // restore the "movable" glow on the player's pieces
    refreshDeselect();
    Sound.deselect();
  }

  function onPieceClick(id){
    if(gameOver || locked) return;
    audio(); hideCursor();
    const found = findPiece(id);
    if(!found) return;
    const {r,c,p} = found;

    if(selected){
      if(selected.r === r && selected.c === c) return;             // the selected piece: ignore
      const cm = currentCaptures.find(m => m.jr === r && m.jc === c);
      if(cm){ doCapture(selected, cm); return; }                   // tapped the X'd enemy
      Sound.nudge();                                               // any other piece: locked out
      return;
    }
    if(p.color === turn){ selectPiece(r,c); return; }
    Sound.nudge();
  }

  function onSquareClick(r,c){
    if(gameOver || locked) return;
    audio(); hideCursor();
    if(!selected) return;                                          // no checker chosen yet: do nothing
    if(currentMoves.has(key(r,c))){ doSimpleMove(selected, {r,c}); return; }
    const cm = currentCaptures.find(m => m.r === r && m.c === c);
    if(cm){ doCapture(selected, cm); return; }
    Sound.nudge();                                                 // not a legal destination
  }

  function doSimpleMove(from, to){
    locked = true; refreshDeselect();
    const p = board[from.r][from.c];
    board[to.r][to.c] = p;
    board[from.r][from.c] = null;
    clearSelectionVisuals();
    selected = null;
    const el = pieceEls.get(p.id);
    if(el) el.classList.add("is-moving");
    movePieceEl(p.id, to.r, to.c);
    Sound.move();
    setCursor(to.r, to.c);
    window.setTimeout(() => {
      if(el) el.classList.remove("is-moving");
      if(to.r === PROMO_ROW[p.color] && !p.king){ p.king = true; kingify(p.id); Sound.king(); }
      endTurn();
    }, MOVE_MS);
  }

  function doCapture(from, move){
    locked = true; refreshDeselect();
    const p = board[from.r][from.c];
    const victim = board[move.jr][move.jc];

    board[move.jr][move.jc] = null;
    const vEl = pieceEls.get(victim.id);
    if(vEl){
      vEl.classList.add("is-captured");
      pieceEls.delete(victim.id);
      window.setTimeout(() => { if(vEl.parentNode) vEl.parentNode.removeChild(vEl); }, MOVE_MS + 40);
    }

    board[move.r][move.c] = p;
    board[from.r][from.c] = null;
    clearSelectionVisuals();
    const el = pieceEls.get(p.id);
    if(el) el.classList.add("is-moving");
    movePieceEl(p.id, move.r, move.c);
    captured[p.color] += 1;
    renderTrays();
    Sound.capture();
    setCursor(move.r, move.c);

    window.setTimeout(() => {
      if(el) el.classList.remove("is-moving");
      // crowning ends the turn even if more jumps are available (standard checkers)
      if(move.r === PROMO_ROW[p.color] && !p.king){
        p.king = true; kingify(p.id); Sound.king(); endTurn(); return;
      }
      const more = capturesFrom(move.r, move.c, p);
      if(more.length){
        chainPiece = {r:move.r, c:move.c};
        selected = {r:move.r, c:move.c};
        currentMoves = new Set();
        currentCaptures = more;
        if(el) el.classList.add("is-selected");
        showHints();
        updateMovable();
        refreshDeselect();      // still hidden (chainPiece is set)
        locked = false;
      } else {
        endTurn();
      }
    }, MOVE_MS);
  }

  function endTurn(){
    selected = null; chainPiece = null;
    currentMoves = new Set(); currentCaptures = [];
    clearSelectionVisuals();
    turn = other(turn);
    if(!colorHasMove(turn)){ finish(other(turn)); return; }
    refreshSeats();
    updateMovable();
    refreshDeselect();
    locked = false;
  }

  function finish(winner){
    gameOver = true; locked = false;
    clearSelection(); refreshSeats(); updateMovable(); refreshDeselect();
    resultEl.textContent = cap(winner) + " wins";
    bannerEl.classList.add("show");
    Sound.win();
  }

  /* ---------------- keyboard play (cursor becomes visible here) ---------------- */
  boardEl.addEventListener("keydown", e => {
    if(gameOver || locked) return;
    const k = e.key;
    if(k === "Escape"){ e.preventDefault(); audio(); userDeselect(); return; }
    if(k!=="ArrowUp"&&k!=="ArrowDown"&&k!=="ArrowLeft"&&k!=="ArrowRight"&&k!=="Enter"&&k!==" ") return;
    e.preventDefault();
    audio();
    cursorShown = true; paintCursor();

    if(k==="Enter"||k===" "){
      const cur = cursor;
      if(selected){
        if(selected.r===cur.r && selected.c===cur.c) return;
        if(currentMoves.has(key(cur.r,cur.c))) doSimpleMove(selected,{r:cur.r,c:cur.c});
        else { const cm = currentCaptures.find(m => m.r===cur.r && m.c===cur.c); if(cm) doCapture(selected, cm); else Sound.nudge(); }
      } else {
        const p = board[cur.r][cur.c];
        if(p && p.color===turn) selectPiece(cur.r, cur.c);
        else Sound.nudge();
      }
      return;
    }

    let r=cursor.r, c=cursor.c;
    if(k==="ArrowUp")         r=Math.max(0,r-1);
    else if(k==="ArrowDown")  r=Math.min(SIZE-1,r+1);
    else if(k==="ArrowLeft")  c=Math.max(0,c-1);
    else if(k==="ArrowRight") c=Math.min(SIZE-1,c+1);
    setCursor(r,c);
  });

  /* deselect via the button (works regardless of board focus) */
  deselectBtn.addEventListener("click", () => {
    if(deselectBtn.disabled) return;
    audio();
    userDeselect();
  });

  /* ---------------- setup ---------------- */
  function setupGame(){
    board = Array.from({length:SIZE}, () => new Array(SIZE).fill(null));
    pieceEls.forEach(el => { if(el.parentNode) el.parentNode.removeChild(el); });
    pieceEls.clear();
    piecesEl.innerHTML = "";
    pieceSeq = 0;

    captured = {red:0, black:0};
    turn = "black";                         // Black (bottom / near player) moves first
    selected = null; chainPiece = null;
    currentMoves = new Set(); currentCaptures = [];
    gameOver = false; locked = false;
    cursor = {r:6, c:1}; cursorShown = false; paintCursor();   // cursor hidden until keyboard use

    for(let r=0;r<3;r++)    for(let c=0;c<SIZE;c++) if(isDark(r,c)) makePiece("red", r, c);
    for(let r=5;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(isDark(r,c)) makePiece("black", r, c);

    bannerEl.classList.remove("show");
    clearHints();
    renderTrays();
    refreshSeats();
    updateMovable();
    refreshDeselect();
  }

  buildSquares();
  setupGame();
});

/* ---- fullscreen + intro: setup covers the board until Start; auto-exits on game end ---- */
window.fsElement=function(){ return document.fullscreenElement||document.webkitFullscreenElement||null; };
window.fsEnter=function(){ var el=document.documentElement, fn=el.requestFullscreen||el.webkitRequestFullscreen; if(fn){ try{ var p=fn.call(el); if(p&&p.catch) p.catch(function(){}); }catch(e){} } };
window.fsExit=function(){ var fn=document.exitFullscreen||document.webkitExitFullscreen; if(fn&&window.fsElement()){ try{ var p=fn.call(document); if(p&&p.catch) p.catch(function(){}); }catch(e){} } };
(function(){
  var g=function(id){ return document.getElementById(id); };
  var b=g("fsbtn");
  if(b){
    var sync=function(){ b.classList.toggle("fs-on", !!window.fsElement()); };
    document.addEventListener("fullscreenchange", sync);
    document.addEventListener("webkitfullscreenchange", sync);
    b.onclick=function(){ if(window.fsElement()) window.fsExit(); else window.fsEnter(); };
  }
  var sb=g("startbtn"); if(sb){ sb.onclick=function(){ var s=g("setup"); if(s) s.classList.add("hidden"); }; }
  var bn=g("banner");
  if(bn && window.MutationObserver){
    new MutationObserver(function(){ if(bn.classList.contains("show")) window.fsExit(); }).observe(bn,{attributes:true,attributeFilter:["class"]});
  }
})();
</script>
</body>
</html>
