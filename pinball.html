// Table selection with previews. PREV_* must match the .cab-btn inner inset
// (button size minus the 11px ::before inset on each edge).
const PREV_W = 82, PREV_H = 100;

function showTableScreen() {
  tableScreen.style.display = 'flex';
  startScreen.style.display = 'none';
  const row = document.getElementById('tableRow');
  row.innerHTML = '';

  tables.forEach((table) => {
    const btn = document.createElement('button');
    btn.className = 'cab-btn table-btn';
    if (table.id === selectedTable.id) btn.classList.add('selected');

    const prevCanvas = document.createElement('canvas');
    prevCanvas.width = PREV_W;
    prevCanvas.height = PREV_H;
    const pctx = prevCanvas.getContext('2d');

    // Map field-space coordinates into the preview canvas, preserving aspect ratio.
    const fieldXs = fieldPoly.map(p => p.x);
    const fieldYs = fieldPoly.map(p => p.y);
    const fieldMinX = Math.min(...fieldXs), fieldMaxX = Math.max(...fieldXs);
    const fieldMinY = Math.min(...fieldYs), fieldMaxY = Math.max(...fieldYs);
    const fieldW = fieldMaxX - fieldMinX, fieldH = fieldMaxY - fieldMinY;
    const pad = 4;
    const scale = Math.min((PREV_W - pad * 2) / fieldW, (PREV_H - pad * 2) / fieldH);
    const offX = (PREV_W - fieldW * scale) / 2 - fieldMinX * scale;
    const offY = (PREV_H - fieldH * scale) / 2 - fieldMinY * scale;
    const toX = x => x * scale + offX;
    const toY = y => y * scale + offY;

    table.pegs.forEach(p => {
      const mx = toX(p.x);
      const my = toY(p.y);
      const mr = p.r * scale;

      pctx.fillStyle = 'rgba(0,0,0,0.3)';
      pctx.beginPath();
      pctx.arc(mx + 1.5, my + 2, mr, 0, Math.PI * 2);
      pctx.fill();

      pctx.fillStyle = p.c;
      pctx.beginPath();
      pctx.arc(mx, my, mr, 0, Math.PI * 2);
      pctx.fill();
    });

    (table.bumpers || []).forEach(p => {
      const mx = toX(p.x);
      const my = toY(p.y);
      const mr = p.r * scale;
      // Mini gold ring + white fill + tiny colored center
      pctx.strokeStyle = '#ffd75e';
      pctx.lineWidth = 1.6;
      pctx.beginPath();
      pctx.arc(mx, my, mr + 0.8, 0, Math.PI * 2);
      pctx.stroke();
      pctx.fillStyle = '#f0f0f0';
      pctx.beginPath();
      pctx.arc(mx, my, mr, 0, Math.PI * 2);
      pctx.fill();
      pctx.fillStyle = p.c;
      pctx.beginPath();
      pctx.arc(mx, my, mr * 0.35, 0, Math.PI * 2);
      pctx.fill();
    });

    (table.balls || []).forEach(tb => {
      const mx = toX(tb.x);
      const my = toY(H / 2);
      const mr = tb.r * scale;

      pctx.fillStyle = 'rgba(0,0,0,0.3)';
      pctx.beginPath();
      pctx.arc(mx + 1.5, my + 2, mr, 0, Math.PI * 2);
      pctx.fill();

      const grad = pctx.createRadialGradient(mx - mr * 0.35, my - mr * 0.35, mr * 0.2, mx, my, mr);
      grad.addColorStop(0, '#ffffff');
      grad.addColorStop(0.5, '#c0c0c0');
      grad.addColorStop(1, '#7a7a7a');
      pctx.fillStyle = grad;
      pctx.beginPath();
      pctx.arc(mx, my, mr, 0, Math.PI * 2);
      pctx.fill();
    });

    // Draws a tapered capsule between two circles of different radii,
    // i.e. a flipper shape: wide rounded pivot, narrow rounded tip.
    const drawTaperedFlipper = (x1, y1, r1, x2, y2, r2, color) => {
      pctx.fillStyle = color;
      pctx.beginPath();
      traceTaperedFlipper(pctx, x1, y1, r1, x2, y2, r2);
      pctx.closePath();
      pctx.fill();
    };

    const drawMiniFlipper = (f, color) => {
      const mx = toX(f.px);
      const my = toY(f.py);
      const tx = mx + Math.cos(f.rest) * f.len * scale;
      const ty = my + Math.sin(f.rest) * f.len * scale;
      drawTaperedFlipper(mx, my, 3.6, tx, ty, 1.3, color);
    };

    for (const k in table.flippers) {
      const f = table.flippers[k];
      drawMiniFlipper(f, f.team === 'blue' ? '#4a8cbd' : '#dd5a3f');
    }

    btn.appendChild(prevCanvas);

    btn.onclick = () => {
      initAudio();
      playSound('uiSelect');
      document.querySelectorAll('.table-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedTable = table;
    };

    row.appendChild(btn);
  });
}

// ═════════════════════ STRIKER / RTS LAYER ═════════════════════
// A tower-defense-ish layer on top of the pinball core. Each team's pocket
// (the triangular dead zone between its flippers) grows a single unit in
// place; the pie gauge above/below it charges from play, and each full pie
// upgrades the unit a tier (1 Striker → 2 Pitbull → 3 Wolf → 4 Horse →
// 5 Gator). Tap the pocket to deploy: the unit punts any nearby ball hard
// upfield (the keeper save), drops its own pinball at its feet, and heads
// for the opponent's drain no matter what — dribbling its ball along with
// little kicks routed through clear lanes between the pegs, and shooting
// once the mouth is in range. The pinball stays the
// weapon: a fast enemy-colored ball shatters a striker into confetti, a
// fast friendly ball just bowls him over for STUN_MS. Gators trample.

function colorToTeam(c) {
  if (c === TEAM_COLORS.blue) return 'blue';
  if (c === TEAM_COLORS.red) return 'red';
  return null; // grey table balls have no owner until touched
}

function otherTeam(team) { return team === 'blue' ? 'red' : 'blue'; }

// The pocket sits in the dead-zone triangle between a team's flippers;
// the gauge sits beyond it, set into the goal box like an enamel dial.
function pocketPos(team) {
  return team === 'blue' ? { x: W / 2, y: 112 } : { x: W / 2, y: H - 112 };
}
function gaugePos(team) {
  return team === 'blue' ? { x: W / 2, y: 66 } : { x: W / 2, y: H - 66 };
}

// ── Gauge economy ──
function awardGauge(team, amt) {
  if (!team || gameOver) return;
  const pk = pockets[team];
  if (pk.tier >= MAX_TIER) { pk.charge = 1; return; } // topped out, stays ready
  pk.charge += amt;
  while (pk.charge >= 1 && pk.tier < MAX_TIER) {
    pk.charge -= 1;
    pk.tier++;
    if (pk.tier >= MAX_TIER) pk.charge = 1;
    playSound('tierUp', 0.7 + pk.tier * 0.12);
  }
}

// Passive trickle, doubled for a team while the ball is deep in enemy
// territory. Paused whenever the ball is out of play, same as stun timers.
function updateGauges() {
  if (serving || gameOver) return;
  for (const team of ['blue', 'red']) {
    let rate = BASE_GAUGE_RATE;
    if (ball) {
      const onOpponentHalf = team === 'blue' ? ball.y > H / 2 : ball.y < H / 2;
      if (onOpponentHalf) rate *= GAUGE_AWAY_MULT;
    }
    awardGauge(team, rate);
  }
}

// ── Deployment ──
function deployPocket(team) {
  const pk = pockets[team];
  if (serving || gameOver || pk.tier < 1) return false;
  let alive = 0;
  for (const s of strikers) if (s.team === team) alive++;
  if (alive >= MAX_STRIKERS_PER_TEAM) return false;

  const pos = pocketPos(team);
  const s = spawnStriker(team, pk.tier, pos.x, pos.y);
  pk.tier = 0;
  pk.charge = 0;
  playSound('deploy');
  puntNearbyBalls(s);  // the keeper-save: boot anything already in reach upfield
  spawnStrikerBall(s); // then bring your own ball onto the pitch
  return true;
}

function spawnStriker(team, tier, x, y) {
  const s = {
    team, tier, x, y,
    r: TIER_R[tier],
    vx: 0, vy: 0,
    facing: team === 'blue' ? Math.PI / 2 : -Math.PI / 2, // face downfield
    phase: Math.random() * Math.PI * 2, // walk-cycle clock
    state: 'walk',                      // 'walk' | 'stunned'
    stunLeft: 0,                        // ms; only ticks while ball in play
    kickReadyAt: 0,
    kickAnim: 0,                        // 0..1 leg-thrust flourish, decays
    wanderSeed: Math.random() * 1000,
    wanderPhase: Math.random() * Math.PI * 2
  };
  strikers.push(s);
  return s;
}

// On deploy, boot every ball within reach hard at the opponent's goal —
// timing a deploy against an incoming ball is the defensive skill move.
function puntNearbyBalls(s) {
  const targets = [];
  if (ball) targets.push(ball);
  for (const tb of tableBalls) targets.push(tb);

  const goalY = s.team === 'blue' ? H - 30 : 30;
  for (const b of targets) {
    if (Math.hypot(b.x - s.x, b.y - s.y) > PUNT_RANGE + b.r) continue;
    const aimX = W / 2 + (Math.random() - 0.5) * 90;
    const d = Math.hypot(aimX - b.x, goalY - b.y) || 1;
    const sp = 11 + s.tier * 1.1;
    b.vx = ((aimX - b.x) / d) * sp;
    b.vy = ((goalY - b.y) / d) * sp;
    b.lastHitColor = TEAM_COLORS[s.team];
    b._kickLockUntil = performance.now() + 250;
    s.kickAnim = 1;
    playSound('flipper', 1.4);
  }
}

// Every deployed striker brings its own pinball onto the pitch, dropped at
// its feet, which it then dribbles toward the opponent's drain. The drop
// spot must dodge not just where other balls ARE but where they're GOING —
// the keeper punt travels straight up the facing line, and a spawn placed
// in that corridor gets slammed and launched wild. So candidate spots
// (dead ahead first, then off to either side) are swept against each
// ball's projected path before use. Spawned balls score like any other
// and are cleared at the next serve; they never gate the serve while they
// roam (see the settle check in updateBall).
function spawnStrikerBall(s) {
  const others = [ball].concat(tableBalls);
  const clearSpot = (px, py) => !others.some(o => {
    if (!o) return false;
    for (let t = 0; t <= 24; t += 4) {
      if (Math.hypot(o.x + o.vx * t - px, o.y + o.vy * t - py) <
          o.r + SPAWN_BALL_R + 4) return true;
    }
    return false;
  });
  let px = s.x + Math.cos(s.facing) * (s.r + SPAWN_BALL_R + 2);
  let py = s.y + Math.sin(s.facing) * (s.r + SPAWN_BALL_R + 2);
  outer:
  for (const out of [s.r + SPAWN_BALL_R + 2, s.r + SPAWN_BALL_R + 26]) {
    for (const da of [0, 0.75, -0.75, 1.35, -1.35]) {
      const cx = s.x + Math.cos(s.facing + da) * out;
      const cy = s.y + Math.sin(s.facing + da) * out;
      if (clearSpot(cx, cy)) { px = cx; py = cy; break outer; }
    }
  }
  tableBalls.push({
    x: px,
    y: py,
    r: SPAWN_BALL_R,
    vx: 0, vy: 0,
    lastHitColor: TEAM_COLORS[s.team],
    spawned: true,
    _kickLockUntil: 0
  });
}

// ── Striker update ──
function updateStrikers(dtMs) {
  const now = performance.now();
  for (let i = strikers.length - 1; i >= 0; i--) {
    const s = strikers[i];

    // Knocked down: lie there. The clock only runs while the ball is in
    // play, so a stun can't quietly expire during a serve.
    if (s.state === 'stunned') {
      if (!serving && !gameOver) s.stunLeft -= dtMs;
      if (s.stunLeft <= 0) s.state = 'walk';
      s.vx = 0; s.vy = 0;
      s.kickAnim = Math.max(0, s.kickAnim - dtMs / 260);
      // Even down, a fast enemy ball still finishes the job.
      if (!serving && !gameOver) interactStrikerBalls(s, false, now);
      continue;
    }

    if (serving || gameOver) {
      // Idle at the whistle: no travel, just a slow breathing bob.
      s.phase += 0.03;
      s.vx *= 0.8; s.vy *= 0.8;
      continue;
    }

    steerStriker(s);

    s.x += s.vx;
    s.y += s.vy;
    s.phase += 0.22 * Math.hypot(s.vx, s.vy) + 0.02;
    s.kickAnim = Math.max(0, s.kickAnim - dtMs / 260);

    if (Math.hypot(s.vx, s.vy) > 0.05) {
      s.facing = angleLerp(s.facing, Math.atan2(s.vy, s.vx), 0.14);
    }

    hardCollideStrikerPegs(s);
    flipperShove(s);
    containStriker(s);

    if (interactStrikerBalls(s, true, now)) continue; // squished & removed
  }
}

// Where a striker wants to go this frame, expressed as a desired velocity
// that steering eases toward. Base drive is a meander at the opponent's
// goal mouth; ball sense overrides it.
function steerStriker(s) {
  const speed = TIER_SPEED[s.tier];

  s.wanderPhase += 0.012 + (s.wanderSeed % 0.01);
  let tx = W / 2 + Math.sin(s.wanderPhase + s.wanderSeed) * 120;
  let ty = s.team === 'blue' ? H - 100 : 100;
  let urgency = 1;

  const b = nearestBall(s.x, s.y);
  if (b) {
    const bd = Math.hypot(b.x - s.x, b.y - s.y);
    const bSpeed = Math.hypot(b.vx, b.vy);
    const owner = colorToTeam(b.lastHitColor);
    const onMyHalf = s.team === 'blue' ? s.y < H / 2 : s.y > H / 2;

    if (isThreatToTeam(b, s.team) && (onMyHalf || bd < 260)) {
      // A ball rolling at our drain: sprint to where it's going, not
      // where it is. (Only defenders near the play drop back — the
      // squad doesn't abandon an attack across the ridge.)
      tx = b.x + b.vx * 12;
      ty = b.y + b.vy * 12;
      urgency = 1.55;
    } else if (bSpeed < BALL_FAST && bd < CHASE_R) {
      if (owner === s.team && bd < s.r + b.r + POSSESS_PAD) {
        // Ball's already on his toes: head for the goal and herd it
        // along (the possession spring keeps it glued to his feet).
        urgency = 1.1;
      } else {
        // Any slow ball nearby is playable — chase it. Touching an
        // enemy-owned slow ball is a tackle (the kick claims it).
        tx = b.x; ty = b.y; urgency = 1.2;
      }
    } else if (bSpeed >= BALL_FAST && owner && owner !== s.team && bd < 90) {
      // A hot enemy ball is death — sidestep.
      const away = Math.atan2(s.y - b.y, s.x - b.x);
      tx = s.x + Math.cos(away) * 80;
      ty = s.y + Math.sin(away) * 80;
      urgency = 1.4;
    }
  }

  let dx = tx - s.x, dy = ty - s.y;
  const d = Math.hypot(dx, dy) || 1;
  let desiredX = (dx / d) * speed * urgency;
  let desiredY = (dy / d) * speed * urgency;

  // Peg avoidance: a gentle radial push plus a tangential slide, so they
  // curve around pins instead of stalling nose-first against them.
  for (const p of pegs) {
    const px = s.x - p.x, py = s.y - p.y;
    const pd = Math.hypot(px, py) || 1;
    const reach = AVOID_R + s.r;
    if (pd < reach) {
      const w = 1 - pd / reach;
      const k = w * w * speed * 2.2;
      desiredX += (px / pd) * k;
      desiredY += (py / pd) * k;
      const tX = -py / pd, tY = px / pd;
      const sgn = (tX * desiredX + tY * desiredY) >= 0 ? 1 : -1;
      desiredX += tX * sgn * k * 0.8;
      desiredY += tY * sgn * k * 0.8;
    }
  }

  s.vx += (desiredX - s.vx) * 0.10;
  s.vy += (desiredY - s.vy) * 0.10;
}

function nearestBall(x, y) {
  let best = null, bd = Infinity;
  const consider = b => {
    const d = Math.hypot(b.x - x, b.y - y);
    if (d < bd) { bd = d; best = b; }
  };
  if (ball) consider(ball);
  for (const tb of tableBalls) consider(tb);
  return best;
}

// "Rolling toward our drain": on our half, heading goalward with pace,
// roughly inside the drain corridor.
function isThreatToTeam(b, team) {
  // A ball in your own colors needs real pace to read as a threat —
  // otherwise a striker treats his own returning dribble as an attack
  // and retreats to goalkeep against himself forever.
  const min = colorToTeam(b.lastHitColor) === team ? OWN_THREAT_FAST : 1.1;
  if (Math.hypot(b.vx, b.vy) < min) return false;
  if (Math.abs(b.x - W / 2) > 170) return false;
  if (team === 'blue') return b.y < H / 2 && b.vy < -0.4;
  return b.y > H / 2 && b.vy > 0.4;
}

function hardCollideStrikerPegs(s) {
  for (const p of pegs) {
    const dx = s.x - p.x, dy = s.y - p.y;
    const d = Math.hypot(dx, dy) || 0.001;
    const min = s.r + p.r;
    if (d < min) {
      s.x = p.x + (dx / d) * min;
      s.y = p.y + (dy / d) * min;
    }
  }
}

// A swinging flipper bats strikers aside — walking through the opponent's
// flipper zone is a gamble, and your own flip can scatter your own men.
function flipperShove(s) {
  for (const k in flippers) {
    const f = flippers[k];
    if (Math.abs(f.omega) < 0.03) continue;
    const tx = f.px + Math.cos(f.ang) * f.len;
    const ty = f.py + Math.sin(f.ang) * f.len;
    const hit = segmentCollision(s.x, s.y, s.r + 4, f.px, f.py, tx, ty);
    if (!hit) continue;
    const overlap = (s.r + 4) - hit.dist;
    s.x += hit.nx * overlap;
    s.y += hit.ny * overlap;
    s.vx += hit.nx * 3.2;
    s.vy += hit.ny * 3.2;
  }
}

// Same wall containment as the balls, plus a clamp that keeps figures out
// of the goal mouths themselves — they hover at the lip and tap shots in.
function containStriker(s) {
  containBall(s);
  s.y = Math.max(96, Math.min(H - 96, s.y));
}

// Pairwise pass, run once per frame after everyone has moved: soft-body
// separation, except a tier-5 gator flattens any smaller enemy it reaches.
function separateAllStrikers() {
  const victims = [];
  for (let i = 0; i < strikers.length; i++) {
    const a = strikers[i];
    for (let j = i + 1; j < strikers.length; j++) {
      const b = strikers[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.hypot(dx, dy) || 0.001;
      const min = a.r + b.r;
      if (d >= min) continue;

      if (a.team !== b.team) {
        const aG = a.tier === MAX_TIER, bG = b.tier === MAX_TIER;
        if (aG && !bG) { victims.push([b, a.team]); continue; }
        if (bG && !aG) { victims.push([a, b.team]); continue; }
      }

      const push = (min - d) / 2;
      const nx = dx / d, ny = dy / d;
      a.x -= nx * push; a.y -= ny * push;
      b.x += nx * push; b.y += ny * push;
    }
  }
  for (const v of victims) squishStriker(v[0], v[1]);
}

// Ball contact rules. Returns true if this striker was squished (removed).
function interactStrikerBalls(s, canKick, now) {
  const targets = [];
  if (ball) targets.push(ball);
  for (const tb of tableBalls) targets.push(tb);

  for (const b of targets) {
    const dx = b.x - s.x, dy = b.y - s.y;
    const d = Math.hypot(dx, dy) || 0.001;
    const touch = b.r + s.r;
    const bSpeed = Math.hypot(b.vx, b.vy);
    const owner = colorToTeam(b.lastHitColor);

    // A slow ball in reach gets kicked at the opponent's goal. This is
    // dribbling, shooting, AND tackling in one rule: the kick claims the
    // ball for the kicker's team. The per-ball lock keeps two adjacent
    // figures from ping-ponging it in a single frame.
    if (canKick && d < touch + KICK_RANGE_PAD && bSpeed < BALL_FAST &&
        now >= s.kickReadyAt && now >= (b._kickLockUntil || 0)) {
      kickBall(s, b);
      continue;
    }

    // Possession: a slow ball in his colors (or loose — walking onto it
    // claims it) rides a soft spring just ahead of his toes, so a figure
    // can walk the ball up the ridge instead of watching gravity roll
    // every tap straight back past him. Carry speed is capped well under
    // BALL_FAST so a carried ball never reads as a shot; the cooldown
    // taps still punch it ahead for the dribbling look. One dribbler per
    // ball per frame.
    if (canKick && bSpeed < BALL_FAST && d < touch + POSSESS_PAD &&
        (!owner || owner === s.team) &&
        now >= (b._kickLockUntil || 0) && b._possessTick !== now) {
      b._possessTick = now;
      b.lastHitColor = TEAM_COLORS[s.team];
      const ax = s.x + Math.cos(s.facing) * (touch + 2);
      const ay = s.y + Math.sin(s.facing) * (touch + 2);
      b.vx = b.vx * 0.55 + (ax - b.x) * POSSESS_SPRING;
      b.vy = b.vy * 0.55 + (ay - b.y) * POSSESS_SPRING;
      const csp = Math.hypot(b.vx, b.vy);
      const cap = BALL_FAST * 0.85;
      if (csp > cap) { b.vx *= cap / csp; b.vy *= cap / csp; }
    }

    if (d >= touch) continue;

    if (bSpeed >= BALL_FAST) {
      if (owner && owner !== s.team) {
        // Shot down by an enemy-colored ball: pixel-shatter. The ball
        // ploughs on, only slightly the worse for it.
        b.vx *= 0.88; b.vy *= 0.88;
        squishStriker(s, owner);
        return true;
      }
      const nx = dx / d, ny = dy / d;
      const vn = b.vx * nx + b.vy * ny;
      // A freshly kicked ball has right of way — it can't floor the very
      // figure (or a teammate) it's leaving at point-blank range.
      if (now < (b._kickLockUntil || 0)) continue;
      if (bSpeed >= STUN_FAST && s.state !== 'stunned') {
        // A genuine friendly (or unclaimed) cannonball bowls him over.
        // Figures already down can't be re-stunned into a lock.
        s.state = 'stunned';
        s.stunLeft = STUN_MS;
        if (vn < 0) {
          b.vx -= 1.6 * vn * nx;
          b.vy -= 1.6 * vn * ny;
        }
        b.vx *= 0.9; b.vy *= 0.9;
        playSound('wall', 1.15);
      } else {
        // Merely brisk friendly ball — like one rolling back downhill —
        // body-blocks off him: firm deflection, extra damping, no
        // knockdown. A couple of bounces later it's slow enough to kick.
        if (vn < 0) {
          b.vx -= 1.6 * vn * nx;
          b.vy -= 1.6 * vn * ny;
        }
        b.vx *= 0.8; b.vy *= 0.8;
        playSound('wall', 0.7);
      }
    } else {
      // Slow ball resting against a figure who can't kick yet: hold it
      // off the body (trapping the ball until the next kick is ready).
      const nx = dx / d, ny = dy / d;
      const push = touch - d;
      b.x += nx * push;
      b.y += ny * push;
    }
  }
  return false;
}

// Sample a dense fan of kick angles and take the straightest lane whose
// lookahead ray clears every peg — the "invisible radius" routing that
// walks the ball around the pins (and future bumpers) instead of banging
// it straight into them. The fan is fine-grained because some tables
// leave only needle-thin threading lanes; candidates go straightest-first
// so the first open lane wins, and if nothing clears, the least-blocked
// lane is used. `reach` scales with how far the kick will actually
// travel (long uphill clearing kicks must see all the way to the crest).
function clearKickAngle(b, baseAng, maxOff, reach) {
  if (!pegs.length) return baseAng;
  reach = reach || 116;
  const STEPS = 18;
  let bestAng = baseAng, bestClear = -Infinity;
  for (let k = 0; k <= STEPS * 2; k++) {
    const off = k === 0 ? 0 : (k % 2 ? 1 : -1) * Math.ceil(k / 2) * (maxOff / STEPS);
    const a = baseAng + off;
    const cx = Math.cos(a), cy = Math.sin(a);
    let clear = Infinity;
    for (let d = 14; d <= reach; d += 17) {
      const px = b.x + cx * d, py = b.y + cy * d;
      for (const p of pegs) {
        const c = Math.hypot(px - p.x, py - p.y) - p.r - b.r;
        if (c < clear) clear = c;
      }
    }
    if (clear > 7) return a;
    if (clear > bestClear) { bestClear = clear; bestAng = a; }
  }
  return bestAng;
}

// Two kinds of kick: little dribble taps that walk the ball upfield
// through clear lanes, and a real tier-strength shot once the goal mouth
// is inside SHOT_RANGE. Taps stay little even uphill — the ridge rolls
// them back into the striker's body and he taps again from higher up, so
// the ball is walked out onto the field rather than launched. Either way
// the kick claims the ball.
function kickBall(s, b) {
  const goalX = W / 2 + (Math.random() - 0.5) * 60;
  const goalY = s.team === 'blue' ? H - 30 : 30;
  const distToGoal = Math.hypot(goalX - b.x, goalY - b.y) || 1;
  const shooting = distToGoal < SHOT_RANGE;
  const ownHalf = s.team === 'blue' ? b.y < H / 2 : b.y > H / 2;
  const baseAng = Math.atan2(goalY - b.y, goalX - b.x);
  let ang, sp;
  if (shooting) {
    ang = clearKickAngle(b, baseAng, 0.35);
    sp = Math.min(TIER_KICK[s.tier], 2.6 + distToGoal * 0.014);
  } else {
    // Uphill lanes bend less so the little climb the tap buys isn't
    // wasted going sideways.
    ang = clearKickAngle(b, baseAng, ownHalf ? 0.55 : 0.9);
    sp = DRIBBLE_KICK + s.tier * DRIBBLE_TIER_ADD;
  }
  b.vx = Math.cos(ang) * sp;
  b.vy = Math.sin(ang) * sp;
  b.lastHitColor = TEAM_COLORS[s.team];
  b._kickLockUntil = performance.now() + 240;
  s.kickReadyAt = performance.now() + KICK_COOLDOWN_MS;
  s.kickAnim = 1;
  s.facing = ang;
  playSound('ballClick', shooting ? 1.15 : 0.7);
}

function squishStriker(s, byTeam) {
  if (strikers.indexOf(s) < 0) return; // already gone (e.g. two gators claimed him)
  spawnConfetti(s);
  awardGauge(byTeam, SQUISH_BUMP);
  playSound('squish', 0.8 + s.tier * 0.1);
  strikers.splice(strikers.indexOf(s), 1);
}

// ── Confetti: old-school pixel shatter ──
function spawnConfetti(s) {
  const pal = ANIMAL[s.team];
  const cols = [
    TEAM_COLORS[s.team],                          // jersey stripes
    KIT_BASE,                                     // jersey cream
    s.tier === 1 ? pal.hair : pal['t' + s.tier],  // hair / hide
    pal.skin,                                     // skin
    BOOT_C                                        // boots
  ];
  const n = 22 + s.tier * 4;
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 1 + Math.random() * 4.2;
    confetti.push({
      x: s.x, y: s.y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp - 1.2,
      rot: Math.random() * Math.PI * 2,
      vr: (Math.random() - 0.5) * 0.5,
      size: 2 + Math.random() * 3.5,
      color: cols[Math.floor(Math.random() * cols.length)],
      life: 620 + Math.random() * 500,
      age: 0
    });
  }
}

function updateParticles(dtMs) {
  for (let i = confetti.length - 1; i >= 0; i--) {
    const p = confetti[i];
    p.age += dtMs;
    if (p.age >= p.life) { confetti.splice(i, 1); continue; }
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05; // a whisper of gravity so bits settle onto the felt
    p.vx *= 0.96;
    p.vy *= 0.96;
    p.rot += p.vr;
  }
}

function drawParticles() {
  for (const p of confetti) {
    const fade = 1 - p.age / p.life;
    ctx.save();
    ctx.globalAlpha = Math.min(1, fade * 1.6);
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.7);
    ctx.restore();
  }
}

function angleLerp(a, b, t) {
  let d = (b - a) % (Math.PI * 2);
  if (d > Math.PI) d -= Math.PI * 2;
  if (d < -Math.PI) d += Math.PI * 2;
  return a + d * t;
}

// ── Drawing: pockets, gauges, figures ──
function drawPockets() {
  for (const team of ['blue', 'red']) {
    const pk = pockets[team];
    const pos = pocketPos(team);
    const ready = pk.tier >= 1;

    // A worn patch on the boards where the keeper waits.
    ctx.fillStyle = 'rgba(0,0,0,0.16)';
    ctx.beginPath();
    ctx.ellipse(pos.x, pos.y + 3, 21, 12, 0, 0, Math.PI * 2);
    ctx.fill();

    // The unit-in-progress: grey silhouette until tier 1 exists, then the
    // earned tier in full color, marching in place, wearing the canon's
    // gold "this is waiting for you" ring.
    const showTier = Math.max(1, pk.tier);
    const ghost = {
      team,
      tier: showTier,
      r: TIER_R[showTier],
      x: pos.x, y: pos.y,
      facing: team === 'blue' ? Math.PI / 2 : -Math.PI / 2,
      phase: performance.now() * (ready ? 0.004 : 0.0015),
      state: 'walk',
      kickAnim: 0
    };
    drawStriker(ghost, { ghost: true, ready });

    if (ready) {
      const a = 0.45 + 0.55 * servePulse();
      ctx.strokeStyle = 'rgba(255,215,94,' + a.toFixed(3) + ')';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, ghost.r + 7, 0, Math.PI * 2);
      ctx.stroke();
    }

    drawGauge(team, pk);
  }
}

function drawGauge(team, pk) {
  const gp = gaugePos(team);
  const R = 12;
  ctx.save();
  ctx.translate(gp.x, gp.y);
  if (team === 'blue') ctx.rotate(Math.PI); // blue reads it from the far end

  // Enamel dial set into the goal box.
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.beginPath();
  ctx.arc(0, 0, R + 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Pie fills in the team color; topped out reads as solid gold.
  const fillC = pk.tier >= MAX_TIER ? '#ffd75e' : TEAM_COLORS[team];
  if (pk.charge > 0.003) {
    ctx.fillStyle = fillC;
    ctx.globalAlpha = 0.92;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, R - 0.5, -Math.PI / 2, -Math.PI / 2 + pk.charge * Math.PI * 2);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.strokeStyle = 'rgba(248,248,248,0.85)';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.arc(0, 0, R + 1, 0, Math.PI * 2);
  ctx.stroke();

  if (pk.tier >= 1) {
    ctx.font = "bold 12px 'Avenir Next','Segoe UI',Roboto,system-ui,sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.lineWidth = 3;
    ctx.strokeStyle = 'rgba(0,0,0,0.75)';
    ctx.strokeText(String(pk.tier), 0, 1);
    ctx.fillStyle = '#f8f8f8';
    ctx.fillText(String(pk.tier), 0, 1);
  }
  ctx.restore();
}

function drawStrikers() {
  for (const s of strikers) drawStriker(s);
}

// One figure, drawn in a local frame where +x is the way it's facing.
// Every tier is bipedal — striped club jersey, arms, boots — with the tier
// told entirely by the head (person → pitbull → wolf → horse → alligator)
// and, from tier 2 up, a distinct tail. Kits and animal colorways follow
// the team reference art; the pocket ghost renders the same figure in
// grey until it's ready.
function drawStriker(s, opts) {
  opts = opts || {};
  const ghost = !!opts.ghost;
  const ready = !!opts.ready;
  const mono = ghost && !ready;
  const stunned = s.state === 'stunned';
  const pal = ANIMAL[s.team];
  const teamC = TEAM_COLORS[s.team];
  const kitBase = mono ? '#c6c6c6' : KIT_BASE;
  const kitStripe = mono ? '#9a9a9a' : teamC;
  const animalC = mono ? '#adadad' : (s.tier === 1 ? pal.skin : pal['t' + s.tier]);
  const animalDark = shade(animalC, -38);
  const baseAlpha = ghost ? (ready ? 0.95 : 0.42) : 1;
  const r = s.r;
  const now = performance.now();

  ctx.save();
  ctx.globalAlpha = baseAlpha;
  ctx.translate(s.x, s.y);

  // Shadow stays world-aligned.
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(2, 3, r * 1.05, r * 0.6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Team ring on the felt under live units.
  if (!ghost) {
    ctx.globalAlpha = baseAlpha * 0.5;
    ctx.strokeStyle = teamC;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(0, 2, r + 3.5, (r + 3.5) * 0.72, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = baseAlpha;
  }

  ctx.rotate(stunned ? s.facing + Math.PI / 2 : s.facing);
  if (stunned) ctx.globalAlpha = baseAlpha * 0.88;

  const swing = stunned ? 0 : Math.sin(s.phase) * r * 0.42;
  const kick = s.kickAnim * r * 0.9;
  const sway = Math.sin(s.phase * 0.55) * r * 0.35; // tail lag

  const dot = (x, y, rad, fill) => {
    ctx.fillStyle = fill;
    ctx.beginPath();
    ctx.arc(x, y, rad, 0, Math.PI * 2);
    ctx.fill();
  };
  const ell = (x, y, rx, ry, fill) => {
    ctx.fillStyle = fill;
    ctx.beginPath();
    ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
    ctx.fill();
  };
  const taper = (x1, y1, r1, x2, y2, r2, fill) => {
    ctx.fillStyle = fill;
    ctx.beginPath();
    traceTaperedFlipper(ctx, x1, y1, r1, x2, y2, r2);
    ctx.closePath();
    ctx.fill();
  };

  // ── Tail first, tucked behind the body (tiers 2–5) ──
  if (s.tier === 2) {
    // pitbull: thin whip tail
    taper(-r * 0.8, 0, r * 0.13, -r * 1.5, sway * 0.8, r * 0.05, animalC);
  } else if (s.tier === 3) {
    // wolf: bushy brush with a pale tip
    ell(-r * 1.3, sway * 0.5, r * 0.52, r * 0.3, animalC);
    dot(-r * 1.72, sway * 0.6, r * 0.14, kitBase);
  } else if (s.tier === 4) {
    // horse: long flowing tail in the mane color
    taper(-r * 0.8, 0, r * 0.18, -r * 1.85, sway, r * 0.06,
      mono ? '#8f8f8f' : pal.mane);
  } else if (s.tier === 5) {
    // gator: the big tapered rudder, ridged
    taper(-r * 0.75, 0, r * 0.4, -r * 2.0, sway, r * 0.08, animalC);
    dot(-r * 1.0, sway * 0.2, r * 0.1, animalDark);
    dot(-r * 1.35, sway * 0.55, r * 0.08, animalDark);
  }

  // ── Boots, under the torso ──
  dot(swing + kick, r * 0.45, r * 0.24 + 1.2, mono ? '#8a8a8a' : BOOT_C);
  dot(-swing, -r * 0.45, r * 0.24 + 1.2, mono ? '#8a8a8a' : BOOT_C);

  // ── Torso: the striped club jersey, seen from above ──
  // Stripes run along the facing axis, i.e. head-to-toe like a real kit.
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(-r * 0.05, 0, r * 0.92, r * 0.8, 0, 0, Math.PI * 2);
  ctx.clip();
  ctx.fillStyle = kitBase;
  ctx.fillRect(-r * 1.1, -r * 0.9, r * 2.2, r * 1.8);
  ctx.fillStyle = kitStripe;
  for (const yy of [-r * 0.56, 0, r * 0.56]) {
    ctx.fillRect(-r * 1.1, yy - r * 0.145, r * 2.2, r * 0.29);
  }
  ctx.restore();
  ctx.lineWidth = 1.25;
  ctx.strokeStyle = 'rgba(20,25,20,0.55)';
  ctx.beginPath();
  ctx.ellipse(-r * 0.05, 0, r * 0.92, r * 0.8, 0, 0, Math.PI * 2);
  ctx.stroke();

  // ── Arms counter-swing at the sleeves ──
  dot(-swing * 0.7, r * 0.92, r * 0.2 + 0.8, animalC);
  dot(swing * 0.7, -r * 0.92, r * 0.2 + 0.8, animalC);

  // ── The head: the tier's whole identity ──
  if (s.tier === 1) {
    // person: round head, team-colorway hair across the back
    dot(r * 0.62, 0, r * 0.52, mono ? '#bdbdbd' : pal.skin);
    ctx.fillStyle = mono ? '#8f8f8f' : pal.hair;
    ctx.beginPath();
    ctx.arc(r * 0.62, 0, r * 0.52, Math.PI * 0.55, Math.PI * 1.45);
    ctx.closePath();
    ctx.fill();
    dot(r * 0.86, r * 0.16, 1.1, '#1c1c1c');
    dot(r * 0.86, -r * 0.16, 1.1, '#1c1c1c');
  } else if (s.tier === 2) {
    // pitbull: round head, folded ears, short muzzle, happy tongue
    dot(r * 0.32, r * 0.48, r * 0.17, animalDark);
    dot(r * 0.32, -r * 0.48, r * 0.17, animalDark);
    dot(r * 0.6, 0, r * 0.58, animalC);
    ell(r * 1.05, 0, r * 0.32, r * 0.25, animalDark);
    dot(r * 1.28, 0, 1.7, '#1c1c1c');
    dot(r * 1.08, r * 0.13, r * 0.1, '#e5866f');
    dot(r * 0.72, r * 0.27, 1.3, '#1c1c1c');
    dot(r * 0.72, -r * 0.27, 1.3, '#1c1c1c');
  } else if (s.tier === 3) {
    // wolf: upright pointed ears, long tapered snout
    ctx.fillStyle = animalC;
    ctx.beginPath();
    ctx.moveTo(r * 0.5, r * 0.3); ctx.lineTo(r * 0.14, r * 0.72); ctx.lineTo(r * 0.28, r * 0.24);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(r * 0.5, -r * 0.3); ctx.lineTo(r * 0.14, -r * 0.72); ctx.lineTo(r * 0.28, -r * 0.24);
    ctx.closePath(); ctx.fill();
    dot(r * 0.6, 0, r * 0.54, animalC);
    ctx.fillStyle = animalDark;
    ctx.beginPath();
    ctx.moveTo(r * 0.85, r * 0.2);
    ctx.lineTo(r * 1.5, 0);
    ctx.lineTo(r * 0.85, -r * 0.2);
    ctx.closePath();
    ctx.fill();
    dot(r * 1.46, 0, 1.6, '#1c1c1c');
    dot(r * 0.74, r * 0.24, 1.3, '#1c1c1c');
    dot(r * 0.74, -r * 0.24, 1.3, '#1c1c1c');
  } else if (s.tier === 4) {
    // horse: the long head is the icon, mane crest down the neck
    dot(r * 0.42, r * 0.3, r * 0.13, animalDark);
    dot(r * 0.42, -r * 0.3, r * 0.13, animalDark);
    ell(r * 0.9, 0, r * 0.62, r * 0.3, animalC);
    ell(r * 1.4, 0, r * 0.2, r * 0.22, animalDark);
    dot(r * 1.5, r * 0.1, 1.1, '#1c1c1c');
    dot(r * 1.5, -r * 0.1, 1.1, '#1c1c1c');
    dot(r * 0.86, r * 0.2, 1.3, '#1c1c1c');
    dot(r * 0.86, -r * 0.2, 1.3, '#1c1c1c');
    for (let m = 0; m < 4; m++) {
      dot(r * (0.5 - m * 0.3), 0, r * 0.13, mono ? '#8f8f8f' : pal.mane);
    }
  } else if (s.tier === 5) {
    // alligator: broad tapered snout, periscope eyes, colorway spots
    dot(r * 0.42, r * 0.36, r * 0.17, animalC);
    dot(r * 0.42, -r * 0.36, r * 0.17, animalC);
    taper(r * 0.4, 0, r * 0.5, r * 1.68, 0, r * 0.2, animalC);
    dot(r * 1.58, r * 0.09, 1.3, '#1c1c1c');
    dot(r * 1.58, -r * 0.09, 1.3, '#1c1c1c');
    dot(r * 0.45, r * 0.36, 1.3, '#1c1c1c');
    dot(r * 0.45, -r * 0.36, 1.3, '#1c1c1c');
    const spotC = mono ? '#9a9a9a' : pal.spots;
    dot(r * 0.85, r * 0.16, r * 0.08, spotC);
    dot(r * 1.15, -r * 0.12, r * 0.07, spotC);
    dot(r * 0.6, -r * 0.1, r * 0.07, spotC);
  }

  ctx.restore();

  // Dizzy stars orbit a knocked-down figure (world frame).
  if (stunned) {
    const t = now * 0.006;
    ctx.fillStyle = '#ffd75e';
    for (let k = 0; k < 3; k++) {
      const a = t + k * (Math.PI * 2 / 3);
      ctx.beginPath();
      ctx.arc(s.x + Math.cos(a) * (r + 5), s.y - 4 + Math.sin(a) * (r + 5) * 0.45,
        1.8, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// ── Input: deploying ──
function tryPocketTap(x, y) {
  for (const team of ['blue', 'red']) {
    if (vsCPU && team !== humanTeam) continue;
    const pos = pocketPos(team);
    if (Math.hypot(x - pos.x, y - pos.y) > POCKET_TAP_R) continue;
    if (deployPocket(team)) return true;
  }
  return false;
}

function tryDeployKey(team) {
  if (vsCPU && team !== humanTeam) return;
  deployPocket(team);
}

// ── CPU commander ──
// The machine plays the same economy: it holds out for a random target
// tier (rerolled after each deploy), always cashes in a gator, and — like
// a human hovering a thumb over the pocket — slams the deploy for a punt
// save when a ball bears down on its drain. The per-frame dice give it
// human-ish reaction time instead of frame-perfect saves.
function rollCpuDeployTier() {
  cpuNextDeployTier = 2 + Math.floor(Math.random() * 3); // 2..4
}

function updateCPUCommander() {
  if (!vsCPU || gameOver || serving) return;
  const cpuTeam = otherTeam(humanTeam);
  const pk = pockets[cpuTeam];
  if (pk.tier < 1) return;

  const pos = pocketPos(cpuTeam);
  const inSaveWindow = b => b && isThreatToTeam(b, cpuTeam) &&
    Math.hypot(b.x - pos.x, b.y - pos.y) < PUNT_RANGE * 0.95;

  let danger = inSaveWindow(ball);
  if (!danger) for (const tb of tableBalls) if (inSaveWindow(tb)) { danger = true; break; }

  if (danger) {
    if (Math.random() < 0.12) { deployPocket(cpuTeam); rollCpuDeployTier(); }
    return;
  }

  let alive = 0;
  for (const s of strikers) if (s.team === cpuTeam) alive++;

  if (pk.tier >= MAX_TIER || (pk.tier >= cpuNextDeployTier && alive < 3)) {
    deployPocket(cpuTeam);
    rollCpuDeployTier();
  }
}

function resetRTS() {
  pockets = { blue: { tier: 0, charge: 0 }, red: { tier: 0, charge: 0 } };
  strikers = [];
  confetti = [];
  rollCpuDeployTier();
}

// Main loop
function loop() {
  // Movement stays per-frame like the rest of the game; dtMs only feeds
  // the wall-clock timers (stuns, kick cooldowns, particle lifetimes).
  const nowMs = performance.now();
  const dtMs = Math.min(50, nowMs - lastFrameMs);
  lastFrameMs = nowMs;

  // Update first, then draw: the frame shows the state it just computed,
  // instead of last frame's — one frame less input latency.
  updateCPU();
  updateCPUCommander();
  updateFlippers();
  updateBall();
  updateGauges();
  updateStrikers(dtMs);
  separateAllStrikers();
  updateParticles(dtMs);

  drawScenery();
  drawScores();
  drawPegs();
  drawBumpers();
  drawPockets();
  drawStrikers(); // under the flippers and ball: the hardware rides above the men
  for (const k in flippers) drawFlipper(flippers[k]);
  const prompt = servePromptVisible();
  if (prompt) drawServeHalo(ball);
  if (ball) drawBall(ball);
  if (prompt) drawServeRing(ball);
  for (const tb of tableBalls) drawBall(tb);
  drawParticles();
  drawAimPreview();

  if (cpuCountdownStart > 0) {
    const now = performance.now();
    const progress = Math.min(1, (now - cpuCountdownStart) / COUNTDOWN_MS);
    drawCountdown(progress);
    if (progress >= 1) autoServe();
  }

  requestAnimationFrame(loop);
}

// Boot
loadTable(tables[0]);
loop();
</script>
