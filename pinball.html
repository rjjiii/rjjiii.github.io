// ── SOUND ──
let audioCtx;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

// When true, the physics functions run silently: no sounds, no peg flashes.
// Used by CPU serve rollouts, which step the real physics on cloned balls.
let physicsQuiet = false;

function playSound(type, power = 1) {
  if (physicsQuiet) return;
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();

    if (type === 'flipper') {
      // Solenoid-style CHOCK: a dry low-mid thump with a fast downward
      // pitch snap (mimics the coil/stop mechanism) plus a brief noise
      // click for the mechanical edge. Short and dry, no ring.
      const now = audioCtx.currentTime;
      const clamp = Math.max(0.4, Math.min(1.6, power));

      const noiseDur = 0.015;
      const bufferSize = Math.ceil(audioCtx.sampleRate * noiseDur);
      const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = noiseBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
      const noise = audioCtx.createBufferSource();
      noise.buffer = noiseBuffer;
      const noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = 'bandpass';
      noiseFilter.frequency.value = 2000;
      noiseFilter.Q.value = 0.9;
      const noiseGain = audioCtx.createGain();
      noiseGain.gain.setValueAtTime(0.3 * clamp, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + noiseDur);
      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(audioCtx.destination);
      noise.start(now);
      noise.stop(now + noiseDur);

      const bodyOsc = audioCtx.createOscillator();
      bodyOsc.type = 'square';
      bodyOsc.frequency.setValueAtTime(240 + clamp * 40, now);
      bodyOsc.frequency.exponentialRampToValueAtTime(110, now + 0.05);
      const bodyFilter = audioCtx.createBiquadFilter();
      bodyFilter.type = 'lowpass';
      bodyFilter.frequency.value = 700;
      const bodyGain = audioCtx.createGain();
      const bodyDecay = 0.09;
      bodyGain.gain.setValueAtTime(0.4 * clamp, now);
      bodyGain.gain.exponentialRampToValueAtTime(0.001, now + bodyDecay);
      bodyOsc.connect(bodyFilter);
      bodyFilter.connect(bodyGain);
      bodyGain.connect(audioCtx.destination);
      bodyOsc.start(now);
      bodyOsc.stop(now + bodyDecay + 0.02);

      return; // fully handled above, skip the default osc/filter/gain chain
    } else if (type === 'peg') {
      // Metallic bumper clank: short noise "hit" transient + a handful of
      // inharmonic partials (non-integer frequency ratios, like a struck
      // bit of metal) that ring out and decay at different rates.
      const now = audioCtx.currentTime;
      const baseFreq = 480 + Math.random() * 60;

      // Noise transient for the initial metallic "tick" of impact
      const noiseDur = 0.02;
      const bufferSize = Math.ceil(audioCtx.sampleRate * noiseDur);
      const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = noiseBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
      const noise = audioCtx.createBufferSource();
      noise.buffer = noiseBuffer;
      const noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = 'highpass';
      noiseFilter.frequency.value = 2500;
      const noiseGain = audioCtx.createGain();
      noiseGain.gain.setValueAtTime(0.35 * power, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + noiseDur);
      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(audioCtx.destination);
      noise.start(now);
      noise.stop(now + noiseDur);

      // Inharmonic partials ringing out, like a struck metal bar/bell
      const partials = [
        { ratio: 1.0,  gain: 0.22 * power, decay: 0.16 },
        { ratio: 2.37, gain: 0.14 * power, decay: 0.11 },
        { ratio: 3.82, gain: 0.09 * power, decay: 0.07 },
        { ratio: 5.4,  gain: 0.05 * power, decay: 0.05 }
      ];
      for (const part of partials) {
        const pOsc = audioCtx.createOscillator();
        pOsc.type = 'triangle';
        pOsc.frequency.value = baseFreq * part.ratio;
        const pGain = audioCtx.createGain();
        pGain.gain.setValueAtTime(part.gain, now);
        pGain.gain.exponentialRampToValueAtTime(0.001, now + part.decay);
        pOsc.connect(pGain);
        pGain.connect(audioCtx.destination);
        pOsc.start(now);
        pOsc.stop(now + part.decay + 0.02);
      }

      return; // fully handled above, skip the default osc/filter/gain chain
    } else if (type === 'ballClick') {
      // Steel-on-steel click, Newton's-cradle style: a very short bright
      // noise tick plus a couple of high inharmonic partials that die fast.
      const now = audioCtx.currentTime;
      const baseFreq = 2200 + Math.random() * 400;

      const noiseDur = 0.012;
      const bufferSize = Math.ceil(audioCtx.sampleRate * noiseDur);
      const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = noiseBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
      const noise = audioCtx.createBufferSource();
      noise.buffer = noiseBuffer;
      const noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = 'highpass';
      noiseFilter.frequency.value = 4000;
      const noiseGain = audioCtx.createGain();
      noiseGain.gain.setValueAtTime(0.4 * power, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + noiseDur);
      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(audioCtx.destination);
      noise.start(now);
      noise.stop(now + noiseDur);

      const partials = [
        { ratio: 1.0,  gain: 0.16 * power, decay: 0.05 },
        { ratio: 1.83, gain: 0.10 * power, decay: 0.035 },
        { ratio: 2.61, gain: 0.06 * power, decay: 0.025 }
      ];
      for (const part of partials) {
        const pOsc = audioCtx.createOscillator();
        pOsc.type = 'sine';
        pOsc.frequency.value = baseFreq * part.ratio;
        const pGain = audioCtx.createGain();
        pGain.gain.setValueAtTime(part.gain, now);
        pGain.gain.exponentialRampToValueAtTime(0.001, now + part.decay);
        pOsc.connect(pGain);
        pGain.connect(audioCtx.destination);
        pOsc.start(now);
        pOsc.stop(now + part.decay + 0.02);
      }

      return; // fully handled above, skip the default osc/filter/gain chain
    } else if (type === 'wall' || type === 'wood') {
      // Woodblock-style THOCK: a duller, lower noise knock plus a soft sine
      // body layered with a quick sub-thump for weight. Kept low-passed and
      // low-pitched throughout so it reads as solid wood rather than the
      // clearer pitched "ping" of a struck bar (which reads as glockenspiel).
      const now = audioCtx.currentTime;
      const baseFreq = 150 + Math.random() * 18;

      // Dull knock (softer, lower-centered than the bumper's bright click)
      const noiseDur = 0.022;
      const bufferSize = Math.ceil(audioCtx.sampleRate * noiseDur);
      const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = noiseBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
      const noise = audioCtx.createBufferSource();
      noise.buffer = noiseBuffer;
      const noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = 'bandpass';
      noiseFilter.frequency.value = 750;
      noiseFilter.Q.value = 0.6;
      const noiseGain = audioCtx.createGain();
      noiseGain.gain.setValueAtTime(0.22 * power, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + noiseDur);
      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(audioCtx.destination);
      noise.start(now);
      noise.stop(now + noiseDur);

      // Main body tone: sine (rounder, no bright harmonics), heavily
      // low-passed so the pitch stays vague rather than clearly tuned.
      const bodyOsc = audioCtx.createOscillator();
      bodyOsc.type = 'sine';
      bodyOsc.frequency.value = baseFreq;
      const bodyFilter = audioCtx.createBiquadFilter();
      bodyFilter.type = 'lowpass';
      bodyFilter.frequency.value = 420;
      const bodyGain = audioCtx.createGain();
      const bodyDecay = 0.15;
      bodyGain.gain.setValueAtTime(0.34 * power, now);
      bodyGain.gain.exponentialRampToValueAtTime(0.001, now + bodyDecay);
      bodyOsc.connect(bodyFilter);
      bodyFilter.connect(bodyGain);
      bodyGain.connect(audioCtx.destination);
      bodyOsc.start(now);
      bodyOsc.stop(now + bodyDecay + 0.02);

      // Sub-thump layer for weight/solidity, decays faster than the body
      const subOsc = audioCtx.createOscillator();
      subOsc.type = 'sine';
      subOsc.frequency.value = baseFreq * 0.55;
      const subGain = audioCtx.createGain();
      const subDecay = 0.07;
      subGain.gain.setValueAtTime(0.28 * power, now);
      subGain.gain.exponentialRampToValueAtTime(0.001, now + subDecay);
      subOsc.connect(subGain);
      subGain.connect(audioCtx.destination);
      subOsc.start(now);
      subOsc.stop(now + subDecay + 0.02);

      return; // fully handled above, skip the default osc/filter/gain chain
    } else if (type === 'goal') {
      // Warm bell: sine partials at near-harmonic ratios (touch of
      // inharmonicity for shimmer/warmth, not the harsh clank ratios used
      // for the metal bumpers) with a soft attack ramp — starting a tone
      // at full volume causes an audible click, which was the main source
      // of the old buzzer's harshness — and a long, gentle natural decay.
      const now = audioCtx.currentTime;
      const baseFreq = 392;
      const partials = [
        { ratio: 1.0,   gain: 0.34, decay: 1.3, detune: -3 },
        { ratio: 1.0,   gain: 0.30, decay: 1.3, detune: 3 },
        { ratio: 2.005, gain: 0.13, decay: 0.85 },
        { ratio: 3.0,   gain: 0.06, decay: 0.5 },
        { ratio: 4.0,   gain: 0.028, decay: 0.32 }
      ];
      for (const part of partials) {
        const pOsc = audioCtx.createOscillator();
        pOsc.type = 'sine';
        pOsc.frequency.value = baseFreq * part.ratio;
        if (part.detune) pOsc.detune.value = part.detune;
        const pFilter = audioCtx.createBiquadFilter();
        pFilter.type = 'lowpass';
        pFilter.frequency.value = 2100;
        const pGain = audioCtx.createGain();
        pGain.gain.setValueAtTime(0, now);
        pGain.gain.linearRampToValueAtTime(part.gain, now + 0.014);
        pGain.gain.exponentialRampToValueAtTime(0.001, now + part.decay);
        pOsc.connect(pFilter);
        pFilter.connect(pGain);
        pGain.connect(audioCtx.destination);
        pOsc.start(now);
        pOsc.stop(now + part.decay + 0.05);
      }

      return; // fully handled above, skip the default osc/filter/gain chain
    } else if (type === 'serve') {
      // Spring release "boing": pitch settles downward while a vibrato
      // (frequency-modulated by a decaying LFO) rings out and dies away,
      // like a stretched spring snapping back and settling.
      const now = audioCtx.currentTime;
      const clamp = Math.max(0.2, Math.min(1.4, power));
      const dur = 0.42;

      const mainOsc = audioCtx.createOscillator();
      mainOsc.type = 'sine';
      const mainFreq = 170 + clamp * 170;
      mainOsc.frequency.setValueAtTime(mainFreq, now);
      mainOsc.frequency.exponentialRampToValueAtTime(mainFreq * 0.72, now + dur);

      const lfo = audioCtx.createOscillator();
      lfo.type = 'sine';
      lfo.frequency.value = 24;
      const lfoGain = audioCtx.createGain();
      lfoGain.gain.setValueAtTime(mainFreq * 0.4 * clamp, now);
      lfoGain.gain.exponentialRampToValueAtTime(0.5, now + dur);
      lfo.connect(lfoGain);
      lfoGain.connect(mainOsc.frequency);

      const mainGain = audioCtx.createGain();
      mainGain.gain.setValueAtTime(0.3 * clamp, now);
      mainGain.gain.exponentialRampToValueAtTime(0.001, now + dur);

      mainOsc.connect(mainGain);
      mainGain.connect(audioCtx.destination);
      lfo.start(now);
      mainOsc.start(now);
      lfo.stop(now + dur);
      mainOsc.stop(now + dur);

      return; // fully handled above, skip the default osc/filter/gain chain
    } else if (type === 'countdown') {
      // Mechanical stopwatch tick: short filtered noise burst + a tiny
      // high tone for the click transient (like a 60 Minutes-style tick).
      const now = audioCtx.currentTime;
      const noiseDur = 0.045;
      const bufferSize = Math.ceil(audioCtx.sampleRate * noiseDur);
      const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = noiseBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

      const noise = audioCtx.createBufferSource();
      noise.buffer = noiseBuffer;

      const noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = 'bandpass';
      noiseFilter.frequency.value = 3200 + (power - 1) * 900;
      noiseFilter.Q.value = 1.2;

      const noiseGain = audioCtx.createGain();
      noiseGain.gain.setValueAtTime(0.5 * power, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + noiseDur);

      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(audioCtx.destination);
      noise.start(now);
      noise.stop(now + noiseDur);

      // High click transient
      const clickOsc = audioCtx.createOscillator();
      clickOsc.type = 'square';
      clickOsc.frequency.value = 2200 + (power - 1) * 500;
      const clickGain = audioCtx.createGain();
      clickGain.gain.setValueAtTime(0.15 * power, now);
      clickGain.gain.exponentialRampToValueAtTime(0.001, now + 0.015);
      clickOsc.connect(clickGain);
      clickGain.connect(audioCtx.destination);
      clickOsc.start(now);
      clickOsc.stop(now + 0.02);

      return; // fully handled above, skip the default osc/filter/gain chain
    } else if (type === 'uiSelect') {
      // Low thump for radio-style menu selectors (player count, table
      // choice, points stepper): soft, dry, low, no ring -- confirms a
      // choice without demanding attention.
      const now = audioCtx.currentTime;
      const thumpOsc = audioCtx.createOscillator();
      thumpOsc.type = 'sine';
      thumpOsc.frequency.setValueAtTime(150, now);
      thumpOsc.frequency.exponentialRampToValueAtTime(95, now + 0.07);
      const thumpFilter = audioCtx.createBiquadFilter();
      thumpFilter.type = 'lowpass';
      thumpFilter.frequency.value = 500;
      const thumpGain = audioCtx.createGain();
      thumpGain.gain.setValueAtTime(0, now);
      thumpGain.gain.linearRampToValueAtTime(0.22, now + 0.006);
      thumpGain.gain.exponentialRampToValueAtTime(0.001, now + 0.09);
      thumpOsc.connect(thumpFilter);
      thumpFilter.connect(thumpGain);
      thumpGain.connect(audioCtx.destination);
      thumpOsc.start(now);
      thumpOsc.stop(now + 0.1);

      return; // fully handled above, skip the default osc/filter/gain chain
    } else if (type === 'uiAction') {
      // Satisfying click for action buttons (back, start, rematch, menu,
      // etc): a bright, brief transient plus a small underlying thump for
      // tactile weight -- crisp on top, a little body underneath.
      const now = audioCtx.currentTime;

      const noiseDur = 0.012;
      const bufferSize = Math.ceil(audioCtx.sampleRate * noiseDur);
      const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = noiseBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
      const noise = audioCtx.createBufferSource();
      noise.buffer = noiseBuffer;
      const noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = 'bandpass';
      noiseFilter.frequency.value = 3400;
      noiseFilter.Q.value = 1.0;
      const noiseGain = audioCtx.createGain();
      noiseGain.gain.setValueAtTime(0.2, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + noiseDur);
      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(audioCtx.destination);
      noise.start(now);
      noise.stop(now + noiseDur);

      const clickOsc = audioCtx.createOscillator();
      clickOsc.type = 'sine';
      clickOsc.frequency.value = 950;
      const clickGain = audioCtx.createGain();
      clickGain.gain.setValueAtTime(0.18, now);
      clickGain.gain.exponentialRampToValueAtTime(0.001, now + 0.035);
      clickOsc.connect(clickGain);
      clickGain.connect(audioCtx.destination);
      clickOsc.start(now);
      clickOsc.stop(now + 0.04);

      const thumpOsc = audioCtx.createOscillator();
      thumpOsc.type = 'sine';
      thumpOsc.frequency.value = 280;
      const thumpGain = audioCtx.createGain();
      thumpGain.gain.setValueAtTime(0.1, now);
      thumpGain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
      thumpOsc.connect(thumpGain);
      thumpGain.connect(audioCtx.destination);
      thumpOsc.start(now);
      thumpOsc.stop(now + 0.07);

      return; // fully handled above, skip the default osc/filter/gain chain
    } else {
      osc.type = 'sine';
      osc.frequency.value = 300;
      gain.gain.value = 0.2;
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
    }

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    setTimeout(() => osc.stop(), 600);
  } catch(e) {}
}

// Rolling sound: filtered noise (not a tone) so it reads as surface texture
// -- metal rolling across felt/wood -- rather than a pitch, and includes a
// watchdog that auto-fades if updateRollSound() stops being called (e.g. the
// ball is removed mid-roll on a goal). Previously a persistent oscillator
// could get stuck droning forever if that happened, since nothing else
// would ever tell it to stop.
//
// Two steady noise layers blend based on speed: a low resonant "body" layer
// and a higher "grain" layer for surface grit. Both track speed directly and
// continuously with no periodic modulation -- an earlier version used an LFO
// to pulse the volume, but pulsing in the 9-40Hz range is exactly the rate
// the ear reads as rhythmic flutter/buzz (insect wings, rattling) rather
// than continuous rolling texture, and it didn't track the ball's actual
// speed since the LFO ran on its own independent curve.
let rollNoise = null;
let rollBodyFilter = null;
let rollBodyLowpass = null;
let rollBodyGain = null;
let rollGrainFilter = null;
let rollGrainGain = null;
let rollActive = false;
let rollWatchdogTimer = null;

function startRollSound() {
  rollActive = true;
  const loopSec = 1;
  const bufSize = Math.ceil(audioCtx.sampleRate * loopSec);
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) d[i] = Math.random() * 2 - 1;
  rollNoise = audioCtx.createBufferSource();
  rollNoise.buffer = buf;
  rollNoise.loop = true;

  rollBodyFilter = audioCtx.createBiquadFilter();
  rollBodyFilter.type = 'bandpass';
  rollBodyFilter.frequency.value = 150;
  rollBodyFilter.Q.value = 1.6; // broader than before -- fuller, thicker rumble
  rollBodyLowpass = audioCtx.createBiquadFilter();
  rollBodyLowpass.type = 'lowpass';
  rollBodyLowpass.frequency.value = 380; // keeps it warm, cuts any thin/bright edge
  rollBodyGain = audioCtx.createGain();
  rollBodyGain.gain.value = 0;

  rollGrainFilter = audioCtx.createBiquadFilter();
  rollGrainFilter.type = 'bandpass';
  rollGrainFilter.frequency.value = 900;
  rollGrainFilter.Q.value = 1.8;
  rollGrainGain = audioCtx.createGain();
  rollGrainGain.gain.value = 0;

  rollNoise.connect(rollBodyFilter);
  rollBodyFilter.connect(rollBodyLowpass);
  rollBodyLowpass.connect(rollBodyGain);
  rollBodyGain.connect(audioCtx.destination);

  rollNoise.connect(rollGrainFilter);
  rollGrainFilter.connect(rollGrainGain);
  rollGrainGain.connect(audioCtx.destination);

  rollNoise.start();
}

function updateRollSound(vx, vy) {
  if (!audioCtx) return;
  const speed = Math.hypot(vx, vy);
  if (speed <= 2.5) { stopRollSound(); return; }
  if (!rollActive) startRollSound();

  const now = audioCtx.currentTime;
  const t = Math.min(1, (speed - 2.5) / 12);

  rollBodyFilter.frequency.setTargetAtTime(105 + t * 175, now, 0.05);
  rollBodyGain.gain.setTargetAtTime(Math.min(0.032, 0.012 + t * 0.024), now, 0.05);

  rollGrainFilter.frequency.setTargetAtTime(700 + t * 1600, now, 0.05);
  rollGrainGain.gain.setTargetAtTime(Math.min(0.011, 0.0015 + t * 0.011), now, 0.05);

  // Watchdog: if this isn't refreshed again soon, fade out on its own.
  // Guarantees the sound can never persist after callers stop feeding it.
  clearTimeout(rollWatchdogTimer);
  rollWatchdogTimer = setTimeout(stopRollSound, 200);
}

function stopRollSound() {
  if (!rollActive) return;
  rollActive = false;
  clearTimeout(rollWatchdogTimer);
  const now = audioCtx.currentTime;
  rollBodyGain.gain.setTargetAtTime(0, now, 0.08);
  rollGrainGain.gain.setTargetAtTime(0, now, 0.08);
  const n = rollNoise;
  rollNoise = null;
  rollBodyFilter = null;
  rollBodyLowpass = null;
  rollBodyGain = null;
  rollGrainFilter = null;
  rollGrainGain = null;
  setTimeout(() => {
    try { n.stop(); } catch(e) {}
  }, 300);
}

// Persistent spring-stretch tension tone, played while pulling back to serve.
// Modeled as a metal groan rather than a clean tone: two detuned oscillators
// beat against each other (roughness grows with tension), a filtered noise
// layer adds grain, and randomized pitch jitter gives it a stick-slip
// creak-and-catch character instead of a smooth glide.
let springOsc1 = null;
let springOsc2 = null;
let springFilter = null;
let springGain = null;
let springNoise = null;
let springNoiseGain = null;
let springActive = false;
let springPower = 0;
let springJitterTimer = null;
let springIdleTimer = null;
let lastWallSoundTime = 0;

function startSpringSound() {
  springActive = true;

  springOsc1 = audioCtx.createOscillator();
  springOsc1.type = 'sawtooth';
  springOsc2 = audioCtx.createOscillator();
  springOsc2.type = 'sawtooth';
  springFilter = audioCtx.createBiquadFilter();
  springFilter.type = 'bandpass';
  springFilter.Q.value = 3.5;
  springGain = audioCtx.createGain();
  springGain.gain.value = 0;
  springOsc1.connect(springFilter);
  springOsc2.connect(springFilter);
  springFilter.connect(springGain);
  springGain.connect(audioCtx.destination);
  springOsc1.frequency.value = 90;
  springOsc2.frequency.value = 96;
  springOsc1.start();
  springOsc2.start();

  const loopSec = 1;
  const bufSize = Math.ceil(audioCtx.sampleRate * loopSec);
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) d[i] = Math.random() * 2 - 1;
  springNoise = audioCtx.createBufferSource();
  springNoise.buffer = buf;
  springNoise.loop = true;
  const noiseFilter = audioCtx.createBiquadFilter();
  noiseFilter.type = 'bandpass';
  noiseFilter.frequency.value = 1100;
  noiseFilter.Q.value = 0.6;
  springNoiseGain = audioCtx.createGain();
  springNoiseGain.gain.value = 0;
  springNoise.connect(noiseFilter);
  noiseFilter.connect(springNoiseGain);
  springNoiseGain.connect(audioCtx.destination);
  springNoise.start();

  scheduleSpringJitter();
}

function scheduleSpringJitter() {
  if (!springActive) return;
  const now = audioCtx.currentTime;
  if (springOsc1 && springOsc2) {
    const jitterAmt = 3 + springPower * 26;
    const j = (Math.random() - 0.5) * jitterAmt;
    const baseFreq = 90 + springPower * 90;
    const detune = 5 + springPower * 16;
    springOsc1.frequency.setTargetAtTime(baseFreq + j, now, 0.025);
    springOsc2.frequency.setTargetAtTime(baseFreq + detune - j * 0.6, now, 0.025);
  }
  const nextDelay = 35 + Math.random() * 100;
  springJitterTimer = setTimeout(scheduleSpringJitter, nextDelay);
}

function updateSpringSound(power) {
  if (!audioCtx) return;
  power = Math.max(0, Math.min(1, power));
  springPower = power;
  if (power < 0.03) { stopSpringSound(); return; }
  if (!springActive) startSpringSound();

  const now = audioCtx.currentTime;
  const baseFreq = 90 + power * 90;
  springFilter.frequency.setTargetAtTime(baseFreq * 2.6 + power * 300, now, 0.06);
  springGain.gain.setTargetAtTime(0.03 + power * 0.08, now, 0.06);
  springNoiseGain.gain.setTargetAtTime(0.015 + power * 0.05, now, 0.06);

  // Springs only creak while actively being stretched — if the pull
  // distance stops changing (finger holding still), fade to silence
  // instead of sustaining the groan at a fixed tension.
  clearTimeout(springIdleTimer);
  springIdleTimer = setTimeout(() => {
    if (!springActive) return;
    const idleNow = audioCtx.currentTime;
    springGain.gain.setTargetAtTime(0, idleNow, 0.05);
    springNoiseGain.gain.setTargetAtTime(0, idleNow, 0.05);
  }, 80);
}

function stopSpringSound() {
  if (!springActive) return;
  springActive = false;
  clearTimeout(springJitterTimer);
  clearTimeout(springIdleTimer);
  const now = audioCtx.currentTime;
  springGain.gain.setTargetAtTime(0, now, 0.03);
  springNoiseGain.gain.setTargetAtTime(0, now, 0.03);
  const o1 = springOsc1, o2 = springOsc2, n = springNoise;
  springOsc1 = null; springOsc2 = null; springNoise = null;
  springGain = null; springNoiseGain = null; springFilter = null;
  setTimeout(() => {
    try { o1.stop(); } catch(e) {}
    try { o2.stop(); } catch(e) {}
    try { n.stop(); } catch(e) {}
  }, 200);
}

function playCountdownBeep(power = 1) {
  playSound('countdown', power);
}

// Schedules accelerating stopwatch-style ticks across `duration` ms:
// starts slow (~2.5/sec) and speeds up to a rapid flutter (~14/sec)
// right before time runs out, with a louder accented tick on the last one.
let countdownTickToken = 0;
function scheduleCountdownTicks(duration) {
  const myToken = ++countdownTickToken;
  const startInterval = 400;
  const endInterval = 70;
  let elapsed = 0;

  function tick() {
    if (myToken !== countdownTickToken) return; // superseded by a new serve
    if (elapsed >= duration) return;
    const t = Math.min(1, elapsed / duration);
    // ease-in so it stays slow early and ramps quickly near the end
    const eased = t * t;
    const interval = startInterval - eased * (startInterval - endInterval);
    const isFinal = elapsed + interval >= duration;
    playCountdownBeep(isFinal ? 1.6 : 1);
    elapsed += interval;
    setTimeout(tick, interval);
  }
  tick();
}

// ── Load table ──
function loadTable(table) {
  currentTable = table;
  pegs = table.pegs.map(p => ({...p, flashColor: null, flashTime: 0}));
  pegLayerCanvas = null; // peg bake is per-table
  flippers = {};
  for (const k in table.flippers) {
    const f = table.flippers[k];
    flippers[k] = {
      ...f,
      ang: f.rest,
      prevAng: f.rest,
      omega: 0,
      on: false,
      contactUntil: 0,
      cooldownUntil: 0,
      lastClankTime: 0
    };
  }
  resetTableBalls(table);
}

// Table balls live on the midline ridge (y is always H/2), placed by x the
// same way pegs are placed. They respawn at their home spots on every serve.
function resetTableBalls(table) {
  tableBalls = (table.balls || []).map(b => ({
    x: b.x,
    y: H / 2,
    r: b.r,
    vx: 0,
    vy: 0,
    lastHitColor: '#c0c0c0'
  }));
}

// ── Drawing (no green octagon border) ──
// ── Playfield surface: lamplit baize, recessed into the cabinet ──
// The whole surface (lamp falloff + felt grain + inset shadow) is baked once
// into an offscreen canvas and blitted each frame, so the per-pixel noise
// costs nothing at 60fps.
let sceneryCanvas = null;

function buildFeltGrain(size) {
  const off = document.createElement('canvas');
  off.width = size;
  off.height = size;
  const octx = off.getContext('2d');
  const img = octx.createImageData(size, size);
  for (let i = 0; i < size * size; i++) {
    // Half light fibres, half dark, all at very low alpha — random per pixel,
    // so there's no lattice or weave, just fuzz.
    const c = Math.random() < 0.5 ? 255 : 0;
    img.data[i * 4] = c;
    img.data[i * 4 + 1] = c;
    img.data[i * 4 + 2] = c;
    img.data[i * 4 + 3] = Math.floor(Math.random() * 15);
  }
  octx.putImageData(img, 0, 0);
  return off;
}

function tracefieldPath(context) {
  context.beginPath();
  context.moveTo(fieldPoly[0].x, fieldPoly[0].y);
  for (let i = 1; i < fieldPoly.length; i++) context.lineTo(fieldPoly[i].x, fieldPoly[i].y);
  context.closePath();
}

function buildScenery() {
  sceneryCanvas = document.createElement('canvas');
  sceneryCanvas.width = W;
  sceneryCanvas.height = H;
  const fx = sceneryCanvas.getContext('2d');

  tracefieldPath(fx);
  fx.save();
  fx.clip();

  // Lamp falloff. Centred on the midline, not up high like a single-player
  // table: this field is symmetric and contested from both ends, so lighting
  // one half brighter would hand that team a visibility edge. Centring it also
  // lights the ridge crest, which suits the terrain.
  const lampX = W / 2;
  const lampY = H / 2;
  const lamp = fx.createRadialGradient(lampX, lampY, 0, lampX, lampY, 420);
  lamp.addColorStop(0, '#437c39');
  lamp.addColorStop(0.5, '#2a5626');
  lamp.addColorStop(1, '#153014');
  fx.fillStyle = lamp;
  fx.fillRect(0, 0, W, H);

  fx.fillStyle = fx.createPattern(buildFeltGrain(128), 'repeat');
  fx.fillRect(0, 0, W, H);

  // Inset shadow: stroking the field path while clipped to it throws away the
  // outer half of each stroke, leaving a soft dark rim — the felt reads as
  // sunk into the wooden cabinet rather than painted on top of it.
  tracefieldPath(fx);
  fx.lineJoin = 'round';
  fx.strokeStyle = 'rgba(8,18,7,0.18)'; fx.lineWidth = 34; fx.stroke();
  fx.strokeStyle = 'rgba(8,18,7,0.30)'; fx.lineWidth = 18; fx.stroke();
  fx.strokeStyle = 'rgba(8,18,7,0.45)'; fx.lineWidth = 7;  fx.stroke();

  fx.restore();

  // Everything else that never changes during play goes into the same bake:
  // cabinet wood, grain, drains, and the painted white markings. The whole
  // static layer then costs one drawImage per frame instead of ~150 path ops.
  drawBrownBoard(fx);
  drawWoodgrain(fx);
  drawDrains(fx);
  drawWhiteMarkings(fx);
}

function drawScenery() {
  if (!sceneryCanvas) buildScenery();
  ctx.drawImage(sceneryCanvas, 0, 0);
}

function drawBrownBoard(g) {
  g.beginPath();
  g.rect(0, 0, W, H);
  g.moveTo(fieldPoly[0].x, fieldPoly[0].y);
  for (let i = 1; i < fieldPoly.length; i++) g.lineTo(fieldPoly[i].x, fieldPoly[i].y);
  g.closePath();
  g.fillStyle = '#c9a66b';
  g.fill('evenodd');
}

function drawWoodgrain(g) {
  g.save();
  g.beginPath();
  g.rect(0, 0, W, H);
  g.moveTo(fieldPoly[0].x, fieldPoly[0].y);
  for (let i = 1; i < fieldPoly.length; i++) g.lineTo(fieldPoly[i].x, fieldPoly[i].y);
  g.closePath();
  g.clip('evenodd');

  g.strokeStyle = 'rgba(140, 85, 40, 0.22)';
  g.lineWidth = 1.4;
  g.lineCap = 'round';
  for (let x = 3; x < W; x += 6) {
    g.beginPath();
    const wobble = Math.sin(x * 0.035) * 5 + Math.cos(x * 0.02) * 3;
    g.moveTo(x + wobble, 0);
    g.lineTo(x - wobble * 0.7, H);
    g.stroke();
  }
  g.strokeStyle = 'rgba(110, 60, 25, 0.18)';
  g.lineWidth = 1.8;
  for (let x = 10; x < W; x += 23) {
    g.beginPath();
    const wobble = Math.cos(x * 0.028) * 8;
    g.moveTo(x + wobble, 0);
    g.lineTo(x - wobble * 0.5, H);
    g.stroke();
  }
  g.strokeStyle = 'rgba(210, 160, 90, 0.12)';
  g.lineWidth = 1.1;
  for (let x = 18; x < W; x += 31) {
    g.beginPath();
    const wobble = Math.sin(x * 0.04) * 4;
    g.moveTo(x + wobble, 0);
    g.lineTo(x - wobble * 0.6, H);
    g.stroke();
  }
  g.restore();
}

// The goal mouth is exactly the white-outlined box — no further. Everything
// beyond it is the wooden cabinet border, which drawBrownBoard/drawWoodgrain
// have already laid down outside the field polygon.
const GOAL_W = 140, GOAL_H = 36, GOAL_INSET = 48;

function drawDrains(g) {
  const gx = W / 2 - GOAL_W / 2;
  g.fillStyle = '#111';
  g.fillRect(gx, GOAL_INSET, GOAL_W, GOAL_H);
  g.fillRect(gx, H - GOAL_INSET - GOAL_H, GOAL_W, GOAL_H);
}

function drawWhiteMarkings(g) {
  const cx = W / 2, cy = H / 2;
  g.strokeStyle = '#f8f8f8';
  g.fillStyle = '#f8f8f8';
  g.lineWidth = 4;
  g.lineCap = 'round';
  g.lineJoin = 'round';

  g.beginPath(); g.moveTo(55, cy); g.lineTo(W - 55, cy); g.stroke();
  g.beginPath(); g.arc(cx, cy, 62, 0, Math.PI * 2); g.stroke();
  g.beginPath(); g.arc(cx, cy, 5.5, 0, Math.PI * 2); g.fill();

  // Goals are drawn on three sides only — the field-facing edge is left open,
  // so each reads as a mouth rather than a closed rectangle.
  g.lineWidth = 6;
  const gl = cx - GOAL_W / 2, gr = cx + GOAL_W / 2;
  const topInner = GOAL_INSET + GOAL_H, botInner = H - GOAL_INSET - GOAL_H;

  g.beginPath();
  g.moveTo(gl, topInner);
  g.lineTo(gl, GOAL_INSET);
  g.lineTo(gr, GOAL_INSET);
  g.lineTo(gr, topInner);
  g.stroke();

  g.beginPath();
  g.moveTo(gl, botInner);
  g.lineTo(gl, H - GOAL_INSET);
  g.lineTo(gr, H - GOAL_INSET);
  g.lineTo(gr, botInner);
  g.stroke();

  g.lineWidth = 3;
  g.beginPath(); g.arc(cx, 125, 50, 0.2 * Math.PI, 0.8 * Math.PI); g.stroke();
  g.beginPath(); g.arc(cx, H - 125, 50, 1.2 * Math.PI, 1.8 * Math.PI); g.stroke();
}

// One painted score numeral: white paint outline underneath for
// legibility on the green, with the translucent team color over it.
// Everything kept low-opacity so it reads as worn paint on the felt.
function paintScoreNum(text, x, y, fillColor) {
  ctx.strokeStyle = 'rgba(248, 248, 248, 0.45)';
  ctx.lineWidth = 4;
  ctx.lineJoin = 'round';
  ctx.strokeText(text, x, y);
  ctx.fillStyle = fillColor;
  ctx.fillText(text, x, y);
}

function drawScores() {
  const cx = W / 2;
  const cy = H / 2;
  // Slid outward so the digits sit fully clear of the 62px center circle
  // (even at two digits) instead of crossing its line.
  const xOffset = 88;
  const yOffset = 44;

  ctx.save();
  ctx.font = "bold 38px 'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  paintScoreNum(String(score.blue), cx - xOffset, cy - yOffset, 'rgba(74, 140, 189, 0.35)');
  paintScoreNum(String(score.red), cx + xOffset, cy - yOffset, 'rgba(221, 90, 63, 0.35)');

  ctx.translate(cx, cy);
  ctx.rotate(Math.PI);
  paintScoreNum(String(score.blue), xOffset, -yOffset, 'rgba(74, 140, 189, 0.35)');
  paintScoreNum(String(score.red), -xOffset, -yOffset, 'rgba(221, 90, 63, 0.35)');
  ctx.restore();
}

// ── Peg layer ──
// Pegs at rest never change, so they're baked once per table (shadow +
// gradient sphere each) and blitted. Per frame, only currently-flashing
// pegs draw anything on top: the glow halo and a white sphere. The white
// sphere is opaque and congruent with the baked one, so it fully covers it;
// the baked shadow underneath is reused rather than redrawn.
let pegLayerCanvas = null;

function drawPegSphere(g, p, color) {
  const grad = g.createRadialGradient(p.x - 3, p.y - 3, 1, p.x, p.y, p.r);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(0.3, color);
  grad.addColorStop(1, shade(color, -45));
  g.fillStyle = grad;
  g.beginPath();
  g.arc(p.x, p.y, p.r, 0, Math.PI * 2);
  g.fill();
}

function bakePegLayer() {
  pegLayerCanvas = document.createElement('canvas');
  pegLayerCanvas.width = W;
  pegLayerCanvas.height = H;
  const g = pegLayerCanvas.getContext('2d');
  for (const p of pegs) {
    g.fillStyle = 'rgba(0,0,0,0.3)';
    g.beginPath();
    g.arc(p.x + 2, p.y + 3, p.r, 0, Math.PI * 2);
    g.fill();
    drawPegSphere(g, p, p.c);
  }
}

function drawPegs() {
  if (!pegLayerCanvas) bakePegLayer();
  ctx.drawImage(pegLayerCanvas, 0, 0);

  const now = performance.now();
  for (const p of pegs) {
    if (p.flashTime <= now) continue;
    const glowC = p.flashColor || '#ffffff';
    ctx.save();
    ctx.shadowColor = glowC;
    ctx.shadowBlur = 18;
    ctx.fillStyle = glowC;
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r + 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    drawPegSphere(ctx, p, '#ffffff');
  }
}

function shade(hex, a) {
  let r = Math.max(0, Math.min(255, parseInt(hex.slice(1,3),16) + a));
  let g = Math.max(0, Math.min(255, parseInt(hex.slice(3,5),16) + a));
  let b = Math.max(0, Math.min(255, parseInt(hex.slice(5,7),16) + a));
  return `rgb(${r},${g},${b})`;
}

// Builds a tapered "belt" outline between two circles of different radii —
// i.e. a flipper silhouette: wide rounded pivot end, narrow rounded tip end.
// Caller is responsible for ctx.beginPath()/closePath()/fill() around this.
function traceTaperedFlipper(context, x1, y1, r1, x2, y2, r2) {
  const dx = x2 - x1, dy = y2 - y1;
  const dist = Math.hypot(dx, dy) || 0.001;
  const angle = Math.atan2(dy, dx);
  const theta = Math.acos(Math.max(-1, Math.min(1, (r1 - r2) / dist)));

  const p1a = { x: x1 + r1 * Math.cos(angle + theta), y: y1 + r1 * Math.sin(angle + theta) };
  const p1b = { x: x1 + r1 * Math.cos(angle - theta), y: y1 + r1 * Math.sin(angle - theta) };
  const p2a = { x: x2 + r2 * Math.cos(angle + theta), y: y2 + r2 * Math.sin(angle + theta) };

  context.moveTo(p1a.x, p1a.y);
  context.lineTo(p2a.x, p2a.y);
  context.arc(x2, y2, r2, angle + theta, angle - theta, true);
  context.lineTo(p1b.x, p1b.y);
  context.arc(x1, y1, r1, angle - theta, angle + theta, true);
}

function drawFlipper(f) {
  const tx = f.px + Math.cos(f.ang) * f.len;
  const ty = f.py + Math.sin(f.ang) * f.len;

  const mainColor = f.team === 'blue' ? '#4a8cbd' : '#dd5a3f';
  const darkColor = f.team === 'blue' ? '#2b5675' : '#8b3623';

  const locked = !serveFlippersEnabled && f.team === serveTeam;
  ctx.globalAlpha = locked ? 0.35 : 1;

  ctx.fillStyle = mainColor;
  ctx.beginPath();
  traceTaperedFlipper(ctx, f.px, f.py, 9, tx, ty, 3.5);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = darkColor;
  ctx.beginPath();
  traceTaperedFlipper(ctx, f.px, f.py, 3.2, tx, ty, 1.2);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(f.px, f.py, 6.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.globalAlpha = 1;
}

// ── Serve prompt: the canon's "this piece is waiting for you" pulse ──
// Amber glowhalo underneath, pulsing gold ring on top, both on the canon's
// 1.5s ease-in-out cycle. Shown only when a human has the serve and hasn't
// started dragging yet.
function servePromptVisible() {
  return serving && ball && !aiming && !gameOver &&
         !(vsCPU && serveTeam !== humanTeam);
}

function servePulse() {
  const t = (performance.now() % 1500) / 1500;
  return 0.5 - 0.5 * Math.cos(t * Math.PI * 2);
}

// The ball sits still while serving, so the halo gradient is built once per
// serve position and the pulse is applied via globalAlpha — mathematically
// identical to baking the pulse into the stops, without per-frame gradients.
let serveHalo = null;

function drawServeHalo(b) {
  const r = b.r * 3.4;
  if (!serveHalo || serveHalo.x !== b.x || serveHalo.y !== b.y || serveHalo.r !== r) {
    const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, r);
    grad.addColorStop(0, 'rgba(255,200,70,0.7)');
    grad.addColorStop(0.35, 'rgba(255,200,70,0.7)');
    grad.addColorStop(1, 'rgba(255,200,70,0)');
    serveHalo = { x: b.x, y: b.y, r, grad };
  }
  ctx.globalAlpha = 0.22 + 0.46 * servePulse();
  ctx.fillStyle = serveHalo.grad;
  ctx.beginPath();
  ctx.arc(b.x, b.y, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawServeRing(b) {
  const a = 0.45 + 0.55 * servePulse();
  ctx.strokeStyle = 'rgba(255,215,94,' + a.toFixed(3) + ')';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r + 5.5, 0, Math.PI * 2);
  ctx.stroke();
}

function drawBall(b) {
  if (!b) return;

  if (b.lastHitColor) {
    ctx.save();
    ctx.shadowColor = b.lastHitColor;
    ctx.shadowBlur = 25;
    ctx.strokeStyle = b.lastHitColor;
    ctx.lineWidth = 6;
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r + 4, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  ctx.fillStyle = 'rgba(0,0,0,0.38)';
  ctx.beginPath();
  ctx.ellipse(b.x + 3, b.y + 5, b.r * 0.92, b.r * 0.5, 0, 0, Math.PI * 2);
  ctx.fill();

  const g = ctx.createRadialGradient(
    b.x - b.r * 0.38, b.y - b.r * 0.42, 2,
    b.x, b.y, b.r * 1.15
  );
  g.addColorStop(0, '#f2f2f2');
  g.addColorStop(0.28, '#c0c0c0');
  g.addColorStop(0.7, '#7a7a7a');
  g.addColorStop(1, '#3a3a3a');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = 'rgba(255,255,255,0.78)';
  ctx.beginPath();
  ctx.arc(b.x - 5, b.y - 6, 4.2, 0, Math.PI * 2);
  ctx.fill();
}

function drawAimPreview() {
  if (!aiming || !ball) return;

  const dx = aimStartX - aimCurX;
  const dy = aimStartY - aimCurY;
  const dist = Math.hypot(dx, dy);
  if (dist < 8) return;

  const power = Math.min(dist, MAX_AIM_DIST) / MAX_AIM_DIST;
  const len = Math.hypot(dx, dy) || 1;
  const dirX = dx / len;
  const dirY = dy / len;
  const lineLen = 40 + power * 110;

  const r = 255;
  const g = Math.floor(220 - power * 140);
  const b = Math.floor(40 - power * 40);
  const col = `rgb(${r},${g},${Math.max(0,b)})`;

  ctx.save();
  ctx.strokeStyle = col;
  ctx.fillStyle = col;
  ctx.lineWidth = 4 + power * 3;
  ctx.lineCap = 'round';
  ctx.globalAlpha = 0.85;

  ctx.beginPath();
  ctx.moveTo(ball.x, ball.y);
  ctx.lineTo(ball.x + dirX * lineLen, ball.y + dirY * lineLen);
  ctx.stroke();

  const ax = ball.x + dirX * lineLen;
  const ay = ball.y + dirY * lineLen;
  const ah = 12 + power * 6;
  ctx.beginPath();
  ctx.moveTo(ax, ay);
  ctx.lineTo(ax - dirX * ah + dirY * ah * 0.5, ay - dirY * ah - dirX * ah * 0.5);
  ctx.lineTo(ax - dirX * ah - dirY * ah * 0.5, ay - dirY * ah + dirX * ah * 0.5);
  ctx.closePath();
  ctx.fill();

  ctx.globalAlpha = 0.35 + power * 0.4;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r + 8 + power * 18, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

function drawCountdown(progress) {
  const cx = W / 2;
  const cy = H / 2;
  const outerR = 52;
  const innerR = 40;

  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.38)';
  ctx.beginPath();
  ctx.ellipse(cx + 3, cy + 5, outerR * 0.95, outerR * 0.55, 0, 0, Math.PI * 2);
  ctx.fill();

  const metal = ctx.createRadialGradient(
    cx - outerR * 0.38, cy - outerR * 0.42, 2,
    cx, cy, outerR * 1.15
  );
  metal.addColorStop(0, '#f2f2f2');
  metal.addColorStop(0.28, '#c0c0c0');
  metal.addColorStop(0.7, '#7a7a7a');
  metal.addColorStop(1, '#3a3a3a');
  ctx.beginPath();
  ctx.arc(cx, cy, outerR, 0, Math.PI * 2);
  ctx.fillStyle = metal;
  ctx.fill();

  ctx.fillStyle = 'rgba(255,255,255,0.78)';
  ctx.beginPath();
  ctx.arc(cx - 14, cy - 16, 9, 0, Math.PI * 2);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(cx, cy, outerR, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth = 1.8;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, innerR, 0, Math.PI * 2);
  ctx.fillStyle = '#f8f8f8';
  ctx.fill();

  ctx.beginPath();
  ctx.arc(cx, cy, innerR, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,0,0,0.2)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  const totalTicks = 24;
  const wiped = Math.floor(progress * totalTicks);
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  for (let i = 0; i < totalTicks; i++) {
    if (i < wiped) continue;
    const a = -Math.PI / 2 + (i / totalTicks) * Math.PI * 2;
    const r1 = innerR - 3;
    const r2 = innerR - (i % 3 === 0 ? 11 : 7);
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * r1, cy + Math.sin(a) * r1);
    ctx.lineTo(cx + Math.cos(a) * r2, cy + Math.sin(a) * r2);
    ctx.stroke();
  }

  const handAngle = -Math.PI / 2 + progress * Math.PI * 2;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(handAngle);

  ctx.beginPath();
  ctx.moveTo(0, 4);
  ctx.lineTo(innerR - 6, 0);
  ctx.lineTo(0, -4);
  ctx.closePath();
  ctx.fillStyle = '#dd5a3f';
  ctx.fill();

  ctx.beginPath();
  ctx.arc(0, 0, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#b04833';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0, 0, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = '#f8f8f8';
  ctx.fill();

  ctx.restore();
  ctx.restore();
}

// ── Physics with sounds + table balls ──
function segmentCollision(cx, cy, r, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const len2 = dx * dx + dy * dy || 1;
  let t = ((cx - x1) * dx + (cy - y1) * dy) / len2;
  t = Math.max(0, Math.min(1, t));
  const px = x1 + t * dx;
  const py = y1 + t * dy;
  const dist = Math.hypot(cx - px, cy - py);
  if (dist >= r) return null;
  const nx = (cx - px) / (dist || 1);
  const ny = (cy - py) / (dist || 1);
  return { nx, ny, dist, px, py };
}

function resolveFlipper(f, b) {
  if (!b) return;
  if (!serveFlippersEnabled && f.team === serveTeam) return;

  const SAMPLES = 4;
  let hit = null;

  for (let s = 0; s <= SAMPLES; s++) {
    const t = s / SAMPLES;
    const ang = f.prevAng + (f.ang - f.prevAng) * t;
    const tx = f.px + Math.cos(ang) * f.len;
    const ty = f.py + Math.sin(ang) * f.len;
    const candidate = segmentCollision(b.x, b.y, b.r + 3, f.px, f.py, tx, ty);
    if (candidate) { hit = candidate; break; }
  }
  if (!hit) return;

  const overlap = (b.r + 3) - hit.dist;
  b.x += hit.nx * overlap;
  b.y += hit.ny * overlap;

  const rx = hit.px - f.px;
  const ry = hit.py - f.py;
  const fvx = -f.omega * ry;
  const fvy =  f.omega * rx;

  const rvx = b.vx - fvx;
  const rvy = b.vy - fvy;
  const vn = rvx * hit.nx + rvy * hit.ny;

  if (vn < 0) {
    b.vx -= (1 + REST) * vn * hit.nx;
    b.vy -= (1 + REST) * vn * hit.ny;
    const teamColor = f.team === 'blue' ? '#4a8cbd' : '#dd5a3f';
    b.lastHitColor = teamColor;

    const FLIPPER_HIT_THRESHOLD = 1.5; // ignore soft rolls/resting contact
    const FLIPPER_SOUND_DEBOUNCE = 90; // ms, avoid re-triggering mid-collision
    const now = performance.now();
    if (Math.abs(vn) > FLIPPER_HIT_THRESHOLD && now - f.lastClankTime > FLIPPER_SOUND_DEBOUNCE) {
      f.lastClankTime = now;
      playSound('flipper', Math.abs(vn) * 0.1);
    }
  }
}

function updateFlippers() {
  for (const k in flippers) {
    const f = flippers[k];
    let target, maxOmega;

    f.prevAng = f.ang;

    if (!serveFlippersEnabled && f.team === serveTeam) {
      f.on = false;
      target = f.rest;
      maxOmega = RETURN_OMEGA;
    } else {
      target = f.on ? f.act : f.rest;
      maxOmega = f.on ? FLIP_OMEGA : RETURN_OMEGA;
    }

    const diff = target - f.ang;
    const step = Math.sign(diff) * Math.min(Math.abs(diff), maxOmega);
    f.omega = step;
    f.ang += step;

    if (Math.abs(f.ang - target) < 0.0005) {
      f.ang = target;
      f.omega = 0;
    }
  }
}

function resolveWalls(b) {
  for (let i = 0; i < fieldPoly.length; i++) {
    const p0 = fieldPoly[i];
    const p1 = fieldPoly[(i + 1) % fieldPoly.length];

    const isTopEdge = (p0.y < 100 && p1.y < 100);
    const isBottomEdge = (p0.y > H - 100 && p1.y > H - 100);
    const inGoalX = Math.abs((p0.x + p1.x) / 2 - W / 2) < 90;
    if ((isTopEdge || isBottomEdge) && inGoalX) continue;

    const hit = segmentCollision(b.x, b.y, b.r, p0.x, p0.y, p1.x, p1.y);
    if (hit) {
      const overlap = b.r - hit.dist + 0.5;
      b.x += hit.nx * overlap;
      b.y += hit.ny * overlap;
      const vn = b.vx * hit.nx + b.vy * hit.ny;
      if (vn < 0) {
        b.vx -= (1 + REST) * vn * hit.nx;
        b.vy -= (1 + REST) * vn * hit.ny;

        const WALL_HIT_THRESHOLD = 1.2; // ignore soft/pinned contact
        const WALL_SOUND_DEBOUNCE = 90; // ms, avoid rapid-fire retriggering
        const now = performance.now();
        if (Math.abs(vn) > WALL_HIT_THRESHOLD && now - lastWallSoundTime > WALL_SOUND_DEBOUNCE) {
          lastWallSoundTime = now;
          playSound('wall');
        }
      }
    }
  }
}

function containBall(b) {
  let closestDist = Infinity;
  let closestNx = 0, closestNy = 0, closestPx = 0, closestPy = 0;
  let outside = false;

  for (let i = 0; i < fieldPoly.length; i++) {
    const p0 = fieldPoly[i];
    const p1 = fieldPoly[(i + 1) % fieldPoly.length];

    const isTopEdge = (p0.y < 100 && p1.y < 100);
    const isBottomEdge = (p0.y > H - 100 && p1.y > H - 100);
    const inGoalX = Math.abs((p0.x + p1.x) / 2 - W / 2) < 90;
    if ((isTopEdge || isBottomEdge) && inGoalX) continue;

    const dx = p1.x - p0.x, dy = p1.y - p0.y;
    const len2 = dx * dx + dy * dy || 1;
    let t = ((b.x - p0.x) * dx + (b.y - p0.y) * dy) / len2;
    t = Math.max(0, Math.min(1, t));
    const px = p0.x + t * dx;
    const py = p0.y + t * dy;
    const dist = Math.hypot(b.x - px, b.y - py);

    const edgeLen = Math.hypot(dx, dy) || 1;
    const nx = dy / edgeLen;
    const ny = -dx / edgeLen;

    const signed = (b.x - px) * nx + (b.y - py) * ny;
    if (signed > 0) outside = true;

    if (dist < closestDist) {
      closestDist = dist;
      closestNx = nx;
      closestNy = ny;
      closestPx = px;
      closestPy = py;
    }
  }

  if (outside || closestDist < b.r) {
    const targetDist = b.r + 0.5;
    b.x = closestPx - closestNx * targetDist;
    b.y = closestPy - closestNy * targetDist;

    const vn = b.vx * closestNx + b.vy * closestNy;
    if (vn > 0) {
      b.vx -= vn * closestNx * 1.1;
      b.vy -= vn * closestNy * 1.1;
    }
  }
}

// Full physics step for one ball: terrain, friction, integration, and
// collisions with pegs, flippers, and walls. Used by the main ball and
// every table ball alike.
function stepBallPhysics(b) {
  applyTerrain(b);

  b.vx *= FRICTION;
  b.vy *= FRICTION;
  b.x += b.vx;
  b.y += b.vy;

  resolvePegs(b);
  for (const k in flippers) resolveFlipper(flippers[k], b);
  resolveWalls(b);
  resolveWalls(b);
  containBall(b);
}

function resolvePegs(b) {
  for (const p of pegs) {
    const dist = Math.hypot(b.x - p.x, b.y - p.y);
    if (dist < b.r + p.r) {
      const nx = (b.x - p.x) / dist;
      const ny = (b.y - p.y) / dist;
      const overlap = b.r + p.r - dist;
      b.x += nx * overlap;
      b.y += ny * overlap;
      const vn = b.vx * nx + b.vy * ny;
      if (vn < 0) {
        b.vx -= (1 + 0.82) * vn * nx;
        b.vy -= (1 + 0.82) * vn * ny;
        if (!physicsQuiet && b.lastHitColor) {
          p.flashColor = b.lastHitColor;
          p.flashTime = performance.now() + 180;
        }
        playSound('peg');
      }
    }
  }
}

// Equal-mass elastic collision — both balls react. The first ball's
// team color (last flipper touch) passes to the second on contact.
function collideBalls(a, b) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const d = Math.hypot(dx, dy) || 0.0001;
  const overlap = a.r + b.r - d;
  if (overlap <= 0) return;

  const nx = dx / d;
  const ny = dy / d;
  a.x -= nx * overlap / 2;
  a.y -= ny * overlap / 2;
  b.x += nx * overlap / 2;
  b.y += ny * overlap / 2;

  const vn = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny;
  if (vn < 0) {
    const j = (1 + 0.9) * vn / 2;
    a.vx += j * nx;
    a.vy += j * ny;
    b.vx -= j * nx;
    b.vy -= j * ny;
    if (a.lastHitColor) b.lastHitColor = a.lastHitColor;
    playSound('ballClick', Math.min(1.2, 0.35 + Math.abs(vn) * 0.1));
  }
}

function updateBall() {
  if (serving || gameOver) return;

  if (ball) {
    if (!serveFlippersEnabled) {
      if (serveTeam === 'blue' && ball.y > H / 2) serveFlippersEnabled = true;
      if (serveTeam === 'red' && ball.y < H / 2) serveFlippersEnabled = true;
    }

    stepBallPhysics(ball);
    updateRollSound(ball.vx, ball.vy);
  }

  for (const tb of tableBalls) stepBallPhysics(tb);

  if (ball) for (const tb of tableBalls) collideBalls(ball, tb);
  for (let i = 0; i < tableBalls.length; i++) {
    for (let j = i + 1; j < tableBalls.length; j++) {
      collideBalls(tableBalls[i], tableBalls[j]);
    }
  }

  const gw = 65;

  // A table ball through a goal scores just like the main ball, then
  // leaves play — resetTableBalls() brings it home at the next serve.
  for (let i = tableBalls.length - 1; i >= 0; i--) {
    const tb = tableBalls[i];
    if (Math.abs(tb.x - W / 2) >= gw) continue;
    const inTopGoal = tb.y - tb.r < 55;
    const inBottomGoal = tb.y + tb.r > H - 55;
    if (!inTopGoal && !inBottomGoal) continue;

    if (inTopGoal) score.red++;
    else score.blue++;
    pendingServe = inTopGoal ? 'red' : 'blue';
    updateScore();
    playSound('goal');
    tableBalls.splice(i, 1);
  }

  // The main ball scoring doesn't end the rally while other balls are
  // still live — it just leaves play, and the serve waits below.
  if (ball && Math.abs(ball.x - W / 2) < gw) {
    const inTopGoal = ball.y - ball.r < 55;
    const inBottomGoal = ball.y + ball.r > H - 55;
    if (inTopGoal || inBottomGoal) {
      if (inTopGoal) score.red++;
      else score.blue++;
      pendingServe = inTopGoal ? 'red' : 'blue';
      updateScore();
      playSound('goal');
      stopRollSound();
      ball = null;
      lastLivelyTime = performance.now();
    }
  }

  // Move on to the serve only when the field has gone quiet: every
  // remaining table ball motionless on the midline (or none left).
  // Safety valve: if nothing has moved at speed for a while (e.g. a ball
  // wedged in pegs off the midline), serve anyway instead of stalling.
  if (!ball && pendingServe) {
    let anyLively = false;
    let allSettled = true;
    for (const tb of tableBalls) {
      const sp = Math.hypot(tb.vx, tb.vy);
      if (sp > 0.5) anyLively = true;
      if (sp >= 0.06 || Math.abs(tb.y - H / 2) >= 3) allSettled = false;
    }
    if (anyLively) lastLivelyTime = performance.now();

    if (allSettled || performance.now() - lastLivelyTime > 4000) {
      startServe(pendingServe);
    }
  }
}

function updateScore() {
  scoreEl.textContent = `${score.blue}  —  ${score.red}`;
  checkWinCondition();
}

function checkWinCondition() {
  if (gameOver) return;
  if (score.blue >= pointsToWin) showVictory('blue');
  else if (score.red >= pointsToWin) showVictory('red');
}

function showVictory(winner) {
  gameOver = true;
  const victoryScreen = document.getElementById('victoryScreen');
  const title = document.getElementById('victoryTitle');
  const subtitle = document.getElementById('victorySubtitle');
  
  title.textContent = winner.toUpperCase() + ' WINS!';
  subtitle.textContent = `${score.blue} — ${score.red}`;
  title.style.color = winner === 'blue' ? '#4a8cbd' : '#dd5a3f';
  victoryScreen.style.display = 'flex';
}

function updateCPU() {
  if (!vsCPU || serving) return;
  if (!ball && tableBalls.length === 0) return;

  const now = performance.now();
  const cpuTeam = (humanTeam === 'red') ? 'blue' : 'red';

  for (const id in flippers) {
    const f = flippers[id];
    if (f.team !== cpuTeam) continue;

    const rtx = f.px + Math.cos(f.rest) * f.len;
    const rty = f.py + Math.sin(f.rest) * f.len;
    let near = !!(ball && segmentCollision(ball.x, ball.y, ball.r + 22, f.px, f.py, rtx, rty));
    if (!near) {
      for (const t of tableBalls) {
        if (segmentCollision(t.x, t.y, t.r + 22, f.px, f.py, rtx, rty)) {
          near = true;
          break;
        }
      }
    }

    if (near && now > f.cooldownUntil && now > f.contactUntil) {
      f.contactUntil = now + 120;
    }

    if (now < f.contactUntil) {
      f.on = true;
    } else {
      if (f.contactUntil > 0 && now >= f.contactUntil) {
        f.cooldownUntil = now + 1600;
        f.contactUntil = 0;
      }
      f.on = false;
    }
  }
}

// ── CPU serve brain ──
// The old serve fired a blind random angle and conceded constantly (58% own
// goals on Classic: peg rebounds funnel straight back down the goal corridor
// while the server's flippers are still serve-locked ghosts). Instead: sample
// candidates from the same cone, silently roll each forward with the REAL
// physics, throw out any that concede or never crest the ridge, then plunge
// on a random survivor — the machine still "picks a lane", it just looks
// down the lane first. Table-agnostic by construction: pegs, midline balls,
// and extra flippers are all just physics.
const SERVE_CANDIDATES = 16;
const SERVE_SAFE_ENOUGH = 8; // stop looking once this many clean lanes exist
const SERVE_ROLLOUT_FRAMES = 300; // ~5s at 60fps

function rolloutServe(vx, vy) {
  const toward = serveTeam === 'blue' ? 1 : -1;
  const simBall = { x: ball.x, y: ball.y, r: ball.r, vx, vy, lastHitColor: ball.lastHitColor };
  const simBalls = tableBalls.map(tb => ({ ...tb }));

  let crossed = false;
  let maxDepth = -Infinity;

  // Flipper state is read live: receiver's flippers sit at rest as static
  // geometry, the server's are serve-locked ghosts — exactly the situation
  // the real serve launches into.
  physicsQuiet = true;
  try {
    for (let f = 0; f < SERVE_ROLLOUT_FRAMES; f++) {
      stepBallPhysics(simBall);
      for (const tb of simBalls) stepBallPhysics(tb);
      for (const tb of simBalls) collideBalls(simBall, tb);
      for (let i = 0; i < simBalls.length; i++) {
        for (let j = i + 1; j < simBalls.length; j++) {
          collideBalls(simBalls[i], simBalls[j]);
        }
      }

      const depth = toward === 1 ? simBall.y : H - simBall.y;
      if (depth > maxDepth) maxDepth = depth;
      if (toward === 1 ? simBall.y > H / 2 : simBall.y < H / 2) crossed = true;

      // Any ball (served or midline) reaching a goal ends the rollout —
      // same 65px scoring window updateBall uses.
      const g = goalCheck(simBall, toward, crossed, maxDepth);
      if (g) return g;
      for (const tb of simBalls) {
        const gt = goalCheck(tb, toward, crossed, maxDepth);
        if (gt) return gt;
      }
    }
  } finally {
    physicsQuiet = false;
  }
  return { own: false, crossed, maxDepth };
}

function goalCheck(b, toward, crossed, maxDepth) {
  if (Math.abs(b.x - W / 2) >= 65) return null;
  const inTop = b.y - b.r < 55;
  const inBottom = b.y + b.r > H - 55;
  if (!inTop && !inBottom) return null;
  const own = (toward === 1) ? inTop : inBottom;
  if (own) return { own: true, crossed, maxDepth };
  return { own: false, crossed: true, maxDepth: H };
}

function autoServe() {
  if (!serving || !ball) return;

  const toward = serveTeam === 'blue' ? 1 : -1;

  const evaluated = [];
  const safe = [];
  for (let i = 0; i < SERVE_CANDIDATES; i++) {
    const angle = (Math.random() - 0.5) * 0.85;
    const power = 0.48 + Math.random() * 0.42;
    const speed = 7.5 + power * 11.5;
    const c = {
      power,
      vx: Math.sin(angle) * speed,
      vy: Math.cos(angle) * speed * toward
    };
    c.roll = rolloutServe(c.vx, c.vy);
    evaluated.push(c);
    if (!c.roll.own && c.roll.crossed) {
      safe.push(c);
      if (safe.length >= SERVE_SAFE_ENOUGH) break;
    }
  }

  let pick;
  if (safe.length) {
    pick = safe[Math.floor(Math.random() * safe.length)];
  } else {
    // Dense future table where nothing rolls clean: take the least-bad
    // candidate — deepest progress, never preferring an own goal.
    let best = -Infinity;
    for (const c of evaluated) {
      const s = (c.roll.own ? -1e6 : 0) + c.roll.maxDepth;
      if (s > best) { best = s; pick = c; }
    }
  }

  ball.vx = pick.vx;
  ball.vy = pick.vy;

  serving = false;
  msgEl.style.display = 'none';
  cpuCountdownStart = 0;
  countdownTickToken++; // cancel any in-flight countdown ticks
  playSound('serve', pick.power);
}

function startServe(team) {
  serving = true;
  serveTeam = team;
  pendingServe = null;
  serveFlippersEnabled = false;
  aiming = false;
  cpuCountdownStart = 0;

  for (const k in flippers) {
    if (flippers[k].team === team) {
      flippers[k].on = false;
      flippers[k].ang = flippers[k].rest;
      flippers[k].prevAng = flippers[k].rest;
      flippers[k].omega = 0;
      flippers[k].contactUntil = 0;
      flippers[k].cooldownUntil = 0;
    }
  }

  if (currentTable) resetTableBalls(currentTable);

  const y = team === 'blue' ? 210 : 650;
  ball = {
    x: W / 2,
    y,
    r: 13,
    vx: 0,
    vy: 0,
    lastHitColor: null
  };

  const isCPUServe = vsCPU && team !== humanTeam;

  msgEl.style.display = 'block';
  if (isCPUServe) {
    msgEl.style.display = 'none';
    cpuCountdownStart = performance.now();
    scheduleCountdownTicks(COUNTDOWN_MS);
  } else {
    msgEl.innerHTML = '<b>' + (team === 'blue' ? 'BLUE' : 'RED') + '</b> to serve<br>Drag to aim &amp; release';
  }
}

// One control = (team, side). Every flipper matching the pair fires
// together, so extra mid-field flippers ride the same button as the
// standard one on that wing — classic pinball behavior.
function setFlip(team, side, state) {
  for (const k in flippers) {
    const f = flippers[k];
    if (f.team !== team || f.side !== side) continue;
    if (vsCPU && f.team !== humanTeam) continue;
    if (!serveFlippersEnabled && f.team === serveTeam) continue;
    f.on = state;
  }
}

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY
  };
}

// Input: screen touch zones → (team, side) controls
// The four cabinet triangles plus the four margin quadrants beside it. The
// margin zones map to the same (team, side) controls as the triangle they sit
// next to, so a thumb resting off the table still works a flipper.
const ZONE_CONTROLS = {
  tl:  ['blue', 'left'],  tr:  ['blue', 'right'],
  bl:  ['red',  'left'],  br:  ['red',  'right'],
  mtl: ['blue', 'left'],  mtr: ['blue', 'right'],
  mbl: ['red',  'left'],  mbr: ['red',  'right']
};

// Overlays only cover the cabinet, not the margins, so the margin zones would
// otherwise still fire behind an open menu.
const victoryScreenEl = document.getElementById('victoryScreen');
function menusOpen() {
  return startScreen.style.display !== 'none' ||
         tableScreen.style.display !== 'none' ||
         victoryScreenEl.style.display !== 'none';
}

Object.keys(ZONE_CONTROLS).forEach(zoneId => {
  const [team, side] = ZONE_CONTROLS[zoneId];
  const el = document.getElementById(zoneId);
  el.addEventListener('pointerdown', e => { if (menusOpen()) return; e.preventDefault(); setFlip(team, side, true); });
  el.addEventListener('pointerup', e => { e.preventDefault(); setFlip(team, side, false); });
  el.addEventListener('pointerleave', e => { e.preventDefault(); setFlip(team, side, false); });
  el.addEventListener('pointercancel', e => { e.preventDefault(); setFlip(team, side, false); });
});

window.addEventListener('keydown', e => {
  if (e.repeat) return;
  if (e.key === 'q' || e.key === 'Q') setFlip('blue', 'left', true);
  if (e.key === 'e' || e.key === 'E') setFlip('blue', 'right', true);
  if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') setFlip('red', 'left', true);
  if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') setFlip('red', 'right', true);
});
window.addEventListener('keyup', e => {
  if (e.key === 'q' || e.key === 'Q') setFlip('blue', 'left', false);
  if (e.key === 'e' || e.key === 'E') setFlip('blue', 'right', false);
  if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') setFlip('red', 'left', false);
  if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') setFlip('red', 'right', false);
});

canvas.addEventListener('pointerdown', e => {
  initAudio();
  if (!serving || !ball) return;
  if (vsCPU && serveTeam !== humanTeam) return;
  e.preventDefault();
  const pos = getCanvasPos(e);
  aiming = true;
  aimStartX = pos.x;
  aimStartY = pos.y;
  aimCurX = pos.x;
  aimCurY = pos.y;
  try { canvas.setPointerCapture(e.pointerId); } catch (_) {}
});

canvas.addEventListener('pointermove', e => {
  if (!aiming) return;
  e.preventDefault();
  const pos = getCanvasPos(e);
  aimCurX = pos.x;
  aimCurY = pos.y;
  const dx = aimStartX - pos.x;
  const dy = aimStartY - pos.y;
  const dist = Math.hypot(dx, dy);
  const power = Math.min(dist, MAX_AIM_DIST) / MAX_AIM_DIST;
  updateSpringSound(power);
});

function endAim(e) {
  if (!aiming || !ball) return;
  e.preventDefault();
  aiming = false;
  stopSpringSound();

  const dx = aimStartX - aimCurX;
  const dy = aimStartY - aimCurY;
  const dist = Math.hypot(dx, dy);
  if (dist < MIN_AIM_DIST) return;

  const power = Math.min(dist, MAX_AIM_DIST) / MAX_AIM_DIST;
  const speed = 7.5 + power * 11.5;

  const len = dist || 1;
  ball.vx = (dx / len) * speed;
  ball.vy = (dy / len) * speed;

  serving = false;
  msgEl.style.display = 'none';
  playSound('serve', power);
}

canvas.addEventListener('pointerup', endAim);
canvas.addEventListener('pointercancel', endAim);

// Resize
function resizeCanvas() {
  const maxW = window.innerWidth * 0.95;
  const maxH = window.innerHeight * 0.92;
  const aspect = 520 / 860;

  let newW = maxW;
  let newH = newW / aspect;

  if (newH > maxH) {
    newH = maxH;
    newW = newH * aspect;
  }

  canvas.style.width = newW + 'px';
  canvas.style.height = newH + 'px';
  wrap.style.width = newW + 'px';
  wrap.style.height = newH + 'px';
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Points
let pointsDisplay = document.getElementById('pointsDisplay');
const pointsDown = document.getElementById('pointsDown');
const pointsUp = document.getElementById('pointsUp');

pointsDown.addEventListener('click', () => {
  initAudio();
  pointsToWin = Math.max(3, pointsToWin - 1);
  pointsDisplay.textContent = pointsToWin;
  playSound('uiSelect');
});
pointsUp.addEventListener('click', () => {
  initAudio();
  pointsToWin = Math.min(21, pointsToWin + 1);
  pointsDisplay.textContent = pointsToWin;
  playSound('uiSelect');
});

// Fullscreen
const fullscreenBtn = document.getElementById('fullscreenBtn');
const syncFsIcon = () => fullscreenBtn.classList.toggle('fs-on', !!document.fullscreenElement);
document.addEventListener('fullscreenchange', syncFsIcon);
document.addEventListener('webkitfullscreenchange', syncFsIcon);
fullscreenBtn.addEventListener('click', () => {
  initAudio();
  playSound('uiAction');
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(err => console.log(err));
  } else {
    document.exitFullscreen();
  }

// Victory buttons
document.getElementById('rematchBtn').addEventListener('click', () => {

document.getElementById('homeBtn').addEventListener('click', () => {

// Start screen Choose Table button
document.getElementById('startChooseTableBtn').addEventListener('click', () => {

// Table back button
document.getElementById('tableBackBtn').addEventListener('click', () => {

// Player select: just marks the choice (radio-style), no navigation
function selectModeBtn(btnEl, onePlayer) {
  initAudio();
  playSound('uiSelect');
  vsCPU = onePlayer;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
  btnEl.classList.add('selected');

document.getElementById('btn1p').addEventListener('click', (e) => selectModeBtn(e.currentTarget, true));
document.getElementById('btn2p').addEventListener('click', (e) => selectModeBtn(e.currentTarget, false));
document.getElementById('btn1p').classList.add('selected'); // default selection

// Start Game: applies whatever is currently selected and launches
document.getElementById('startGameBtn').addEventListener('click', () => {
  initAudio();
  playSound('uiAction');
  humanTeam = 'red';
  startScreen.style.display = 'none';
  gameOver = false;
  score = { blue: 0, red: 0 };

  loadTable(selectedTable);
  startServe('blue');
});

// Table selection with previews. PREV_* must match the .cab-btn inner inset
// (button size minus the 11px ::before inset on each edge).
const PREV_W = 82, PREV_H = 100;

function showTableScreen() {
  tableScreen.style.display = 'flex';
  startScreen.style.display = 'none';
  const row = document.getElementById('tableRow');
  row.innerHTML = '';

  tables.forEach((table) => {
    const btn = document.createElement('button');
    btn.className = 'cab-btn table-btn';
    if (table.id === selectedTable.id) btn.classList.add('selected');

    const prevCanvas = document.createElement('canvas');
    prevCanvas.width = PREV_W;
    prevCanvas.height = PREV_H;
    const pctx = prevCanvas.getContext('2d');

    // Map field-space coordinates into the preview canvas, preserving aspect ratio.
    const fieldXs = fieldPoly.map(p => p.x);
    const fieldYs = fieldPoly.map(p => p.y);
    const fieldMinX = Math.min(...fieldXs), fieldMaxX = Math.max(...fieldXs);
    const fieldMinY = Math.min(...fieldYs), fieldMaxY = Math.max(...fieldYs);
    const fieldW = fieldMaxX - fieldMinX, fieldH = fieldMaxY - fieldMinY;
    const pad = 4;
    const scale = Math.min((PREV_W - pad * 2) / fieldW, (PREV_H - pad * 2) / fieldH);
    const offX = (PREV_W - fieldW * scale) / 2 - fieldMinX * scale;
    const offY = (PREV_H - fieldH * scale) / 2 - fieldMinY * scale;
    const toX = x => x * scale + offX;
    const toY = y => y * scale + offY;

    table.pegs.forEach(p => {
      const mx = toX(p.x);
      const my = toY(p.y);
      const mr = p.r * scale;

      pctx.fillStyle = 'rgba(0,0,0,0.3)';
      pctx.beginPath();
      pctx.arc(mx + 1.5, my + 2, mr, 0, Math.PI * 2);
      pctx.fill();

      pctx.fillStyle = p.c;
      pctx.beginPath();
      pctx.arc(mx, my, mr, 0, Math.PI * 2);
      pctx.fill();
    });

    (table.balls || []).forEach(tb => {
      const mx = toX(tb.x);
      const my = toY(H / 2);
      const mr = tb.r * scale;

      pctx.fillStyle = 'rgba(0,0,0,0.3)';
      pctx.beginPath();
      pctx.arc(mx + 1.5, my + 2, mr, 0, Math.PI * 2);
      pctx.fill();

      const grad = pctx.createRadialGradient(mx - mr * 0.35, my - mr * 0.35, mr * 0.2, mx, my, mr);
      grad.addColorStop(0, '#ffffff');
      grad.addColorStop(0.5, '#c0c0c0');
      grad.addColorStop(1, '#7a7a7a');
      pctx.fillStyle = grad;
      pctx.beginPath();
      pctx.arc(mx, my, mr, 0, Math.PI * 2);
      pctx.fill();
    });

    // Draws a tapered capsule between two circles of different radii,
    // i.e. a flipper shape: wide rounded pivot, narrow rounded tip.
    const drawTaperedFlipper = (x1, y1, r1, x2, y2, r2, color) => {
      pctx.fillStyle = color;
      pctx.beginPath();
      traceTaperedFlipper(pctx, x1, y1, r1, x2, y2, r2);
      pctx.closePath();
      pctx.fill();
    };

    const drawMiniFlipper = (f, color) => {
      const mx = toX(f.px);
      const my = toY(f.py);
      const tx = mx + Math.cos(f.rest) * f.len * scale;
      const ty = my + Math.sin(f.rest) * f.len * scale;
      drawTaperedFlipper(mx, my, 3.6, tx, ty, 1.3, color);
    };

    for (const k in table.flippers) {
      const f = table.flippers[k];
      drawMiniFlipper(f, f.team === 'blue' ? '#4a8cbd' : '#dd5a3f');
    }

    btn.appendChild(prevCanvas);

    btn.onclick = () => {
      initAudio();
      playSound('uiSelect');
      document.querySelectorAll('.table-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedTable = table;
    };

    row.appendChild(btn);
  });
}

// Main loop
function loop() {
  // Update first, then draw: the frame shows the state it just computed,
  // instead of last frame's — one frame less input latency.
  updateCPU();
  updateFlippers();
  updateBall();

  drawScenery();
  drawScores();
  drawPegs();
  for (const k in flippers) drawFlipper(flippers[k]);
  const prompt = servePromptVisible();
  if (prompt) drawServeHalo(ball);
  if (ball) drawBall(ball);
  if (prompt) drawServeRing(ball);
  for (const tb of tableBalls) drawBall(tb);
  drawAimPreview();

  if (cpuCountdownStart > 0) {
    const now = performance.now();
    const progress = Math.min(1, (now - cpuCountdownStart) / COUNTDOWN_MS);
    drawCountdown(progress);
    if (progress >= 1) autoServe();
  }

  requestAnimationFrame(loop);
}

// Boot
loadTable(tables[0]);
loop();
</script>
